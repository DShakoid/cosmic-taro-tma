<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Tarot v6 - Magic Returns</title>
    <link rel="icon" type="image/png" href="/icon_cosmic_taro128.png">
   
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/taro/tarotData.js"></script>
<style>
    :root {
        --purp: #a855f7;
        --pink: #ec4899;
        --bg: #050508;
        --glass: rgba(255, 255, 255, 0.03);
        --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
        --neon-pink: 0 0 20px rgba(236, 72, 153, 0.7);
    }
   
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; 
        background: var(--bg); 
        color: #f3e8ff;
        display: flex; 
        justify-content: center; 
        min-height: 100vh; 
        overflow-x: hidden;
        overflow-y: auto; 
        user-select: none; 
        -webkit-user-select: none;
    }
    .stars {
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
        z-index: 1;
        pointer-events: none;
    }
    .container {
        position: relative; 
        z-index: 10; 
        width: 100%; 
        max-width: 400px;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: calc(env(safe-area-inset-top, 0px) + 55px) 15px 80px 15px;
        box-sizing: border-box;
        min-height: 100%;
    }
    .menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; z-index: 100; }
    .menu-btn {
        background: var(--glass); border: 1px solid rgba(168, 85, 247, 0.2);
        color: rgba(255,255,255,0.6); padding: 10px 5px; border-radius: 12px;
        font-size: 0.7rem; flex: 1; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-btn.active {
        background: rgba(168, 85, 247, 0.15); color: white; border-color: var(--purp);
        box-shadow: var(--neon-purp);
    }
    .deck-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
    }
    .deck {
        width: 65px; height: 95px;
        background-image: url('/taro/back_card.jpg'); background-size: cover; background-position: center;
        border: 2px solid var(--purp); border-radius: 10px; cursor: pointer;
        box-shadow: var(--neon-purp);
        contain: layout style paint;
    }
    .deck:active { transform: scale(0.95); box-shadow: 0 0 5px var(--purp); }
    .table { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 15px 0; width: 100%; z-index: 5; }
    .table-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
   
    .slot {
        width: 75px; height: 110px; border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 10px; background: rgba(255,255,255,0.01); position: relative; transition: 0.3s;
        contain: layout style paint;
    }
    .slot.large { width: 140px; height: 200px; }
    .slot.active-target { border-color: rgba(236, 72, 153, 0.4); box-shadow: 0 0 10px rgba(236, 72, 153, 0.2); }
    .card-anim { 
        position: fixed; 
        z-index: 500; 
        transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        transform-style: preserve-3d; 
        perspective: 1000px;
        pointer-events: none;
        border-radius: 10px;
        contain: layout style paint;
    }

    .card-anim.flipped { transform: rotateY(180deg); transition: transform 0.7s, left 0.8s, top 0.8s, width 0.8s, height 0.8s; }
    .card-anim.is-reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }
    .card-anim.arrived { box-shadow: var(--neon-pink); pointer-events: auto; }
    
    .face { 
        position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        box-sizing: border-box; 
        overflow: hidden; 
    }
    .face.back { background: #1e1b4b url('/taro/back_card.jpg') center/cover; border: 2px solid var(--purp); z-index: 2; }
    .face.front { background: #0f172a; border: 2px solid var(--pink); transform: rotateY(180deg); padding: 8px; z-index: 3; border-radius: 8px}
    
    .card-emoji { 
        font-size: 1.2rem;
        transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        display: block;
        will-change: transform;
    }
    .card-name { 
        font-size: 0.4rem;
        color: #f3e8ff; 
        margin-top: 5px; 
        text-transform: uppercase; 
        font-weight: 600; 
        text-align: center; 
        transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        will-change: transform;
    }

    .prediction-box {
        width: 95%; background: rgba(20, 15, 30, 0.6); border-radius: 20px;
        padding: 18px; border: 1px solid rgba(168, 85, 247, 0.15);
        backdrop-filter: blur(15px); text-align: center; margin-top: 20px;
    }
    .overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(5px);
    }
    .overlay.active { display: flex; opacity: 1; }
    .modal-card {
        width: 85%; max-width: 320px; background: rgba(10, 7, 15, 0.95);
        border: 2px solid var(--purp); border-radius: 24px; padding: 25px;
        text-align: center; box-shadow: var(--neon-purp);
        transform: scale(0.9); transition: transform 0.3s ease;
    }
    .overlay.active .modal-card { transform: scale(1); }
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    #reset-btn {
    /* Прозрачный фон с легким оттенком, как на лендингах */
    background: rgba(168, 85, 247, 0.1); 
    /* Тонкая, едва заметная рамка */
    border: 1px solid rgba(168, 85, 247, 0.4);
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    /* Эффект размытия заднего плана (стекло) */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

#reset-btn:hover {
    background: rgba(168, 85, 247, 0.2);
    border-color: var(--purp);
    box-shadow: var(--neon-purp); /* Твое фирменное фиолетовое свечение */
    transform: translateY(-1px);
}

#reset-btn:active {
    transform: scale(0.95);
}
    #donate-btn {
    /* Твой золотой градиент */
    background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    background-size: 200% auto; /* Для плавной анимации перелива */
    
    /* Цвет текста меняем на темный, чтобы он читался на золоте */
    color: #1a0b2e; 
    border: none;
    box-shadow: 0 4px 15px rgba(191, 149, 63, 0.4);
    text-shadow: none;
    transition: 0.3s;
    animation: gold-shimmer 3s linear infinite; /* Добавим живое сияние */
        border-radius: 12px; font-size: 0.75rem; font-weight: bold; cursor: pointer;
        transition: 0.2s; box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
}

#donate-btn:hover {
    box-shadow: 0 0 20px rgba(252, 246, 186, 0.6);
    transform: translateY(-2px);
}

/* Анимация, чтобы золото "играло" на свету */
@keyframes gold-shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
   
    .particle {
        position: fixed; width: 5px; height: 5px; border-radius: 50%;
        pointer-events: none; opacity: 0; z-index: 1000;
        animation: particle-fly 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    @keyframes particle-fly {
        0% { transform: translate(0, 0) scale(1.5); opacity: 1; }
        100% { transform: translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px)) scale(0); opacity: 0; }
    }
   
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
   
    #prediction-text { font-size: 0.7rem; line-height: 1.5; color: #e2d5f5; }
    #prediction-text b { color: white; font-size: 0.8rem; text-transform: uppercase; }
    #prediction-text small { color: var(--purp); font-size: 0.75rem; letter-spacing: 1px; display: block; margin-bottom: 5px; }

    @keyframes deck-shake {
    0% { transform: translateX(0px) rotate(0deg); }
    15% { transform: translateX(-4px) rotate(-1deg); }
    30% { transform: translateX(4px) rotate(1deg); }
    45% { transform: translateX(-3px) rotate(-0.5deg); }
    60% { transform: translateX(3px) rotate(0.5deg); }
    75% { transform: translateX(-1px) rotate(-0.2deg); }
    100% { transform: translateX(0px) rotate(0deg); }
}

    .shuffle-card {
        position: fixed;
        z-index: 999;
        pointer-events: none;
        transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .shuffle-btn {
        background: rgba(168, 85, 247, 0.1);
        border: 1px solid rgba(168, 85, 247, 0.3);
        color: var(--purp);
        padding: 6px 15px;
        border-radius: 20px;
        font-size: 0.65rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        letter-spacing: 1px;
        text-transform: uppercase;
        backdrop-filter: blur(5px);
    }

    .shuffle-btn:hover {
        background: rgba(168, 85, 247, 0.2);
        box-shadow: var(--neon-purp);
        color: white;
    }

    .shuffle-btn:active {
        transform: scale(0.95);
    }

    /* Эффект изгиба карты при тасовке */
.card-anim.shuffle-card {
    transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
    filter: drop-shadow(0 5px 8px rgba(0,0,0,0.3));
}

.card-anim.shuffle-card .face.back {
    transition: transform 0.2s ease;
}

/* Эффект "взгляда" на карту сбоку */
@keyframes cardWobble {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(15deg); }
    100% { transform: rotateY(0deg); }
}

.deck-shaking {
    animation: deck-shake 0.3s ease-in-out infinite;
    box-shadow: var(--neon-purp);
}
    
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')" aria-label="Режим Карта дня">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')" aria-label="Режим Неделя">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')" aria-label="Режим Совет">Совет</button>
        </div>
        <div class="deck-container">
            <div class="deck" onclick="drawCard()" role="button" tabindex="0" aria-label="Вытянуть карту"></div>
            <div class="deck-label">ТЯНИ КАРТУ</div>
            <button class="shuffle-btn" onclick="shuffleAnimation()" aria-label="Перемешать колоду">
                <span>ПЕРЕМЕШАТЬ</span>
            </button>
        </div>
        <div id="table" class="table"></div>
        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text" class="fade-in">Выберите режим и прикоснитесь к колоде</div>
            <div class="btn-row">
                <button id="reset-btn" onclick="setMode(currentMode)" style="display:none;" class="reset-btn">ЗАНОВО</button>
                <button id="donate-btn" class="donate-btn" style="display:none;">⭐ ПОБЛАГОДАРИТЬ</button>
            </div>
        </div>
    </div>

    <div id="card-overlay" class="overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="m-emoji" style="font-size: 60px; filter: drop-shadow(0 0 10px white);"></div>
            <div id="m-name" style="color: white; font-weight: bold; font-size: 1.3rem; margin: 10px 0;"></div>
            <div id="m-desc" style="font-size: 0.9rem; text-align: left; line-height: 1.5; color: #e2d5f5;"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; border-radius:12px; background:var(--purp); border:none; color:white; font-weight:bold; cursor:pointer; font-size:0.9rem; box-shadow:var(--neon-purp);">ПОНЯТНО</button>
        </div>
    </div>

<script>
    let currentMode = '';
    let drawnCount = 0;
    let maxCards = 0;
    let selectedCards = [];
    let isAnimating = false;

    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#050508');
        tg.setBackgroundColor('#050508');
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            window.location.href = '../index.html';
        });
    }

    function preloadImages() {
        const images = ['/taro/back_card.jpg'];
        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });
    }
    preloadImages();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(console.log);
    }

    function generateBirthdayPrediction(date) {
        const day = date.split('-')[2];
        const box = document.getElementById('prediction-text');
        if (box) {
            box.innerHTML = `<h3>Ваш личный прогноз</h3><p>Для рожденных ${day}-го числа звезды подготовили особый совет. Тяните карту...</p>`;
        }
    }

    window.addEventListener('load', () => {
        const params = new URLSearchParams(window.location.search);
        setMode('day');

        if (params.get('mode') === 'birthday') {
            const date = localStorage.getItem('userBirthDate');
            if (date) {
                generateBirthdayPrediction(date);
            }
        }
    });

    function setMode(newMode) {
        if (isAnimating) return;
        
        currentMode = newMode;
        drawnCount = 0;
        selectedCards = [];
        const table = document.getElementById('table');
        if (!table) return;
        
        table.innerHTML = '';
        document.querySelectorAll('.card-anim').forEach(c => c.remove());
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        
        const activeBtn = document.getElementById('btn-' + newMode);
        if (activeBtn) activeBtn.classList.add('active');
        
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('donate-btn').style.display = 'none';

        if (newMode === 'day') { createRow(0, 1, true); maxCards = 1; }
        else if (newMode === 'week') { createRow(0, 4); createRow(4, 7); maxCards = 7; }
        else if (newMode === 'advice') { createRow(0, 3); createRow(3, 6); maxCards = 6; }

        function createRow(startId, endId, isLarge = false) {
            const row = document.createElement('div');
            row.className = 'table-row';
            for (let i = startId; i < endId; i++) {
                const s = document.createElement('div');
                s.className = 'slot' + (isLarge ? ' large' : '');
                s.id = 'slot' + i;
                row.appendChild(s);
            }
            table.appendChild(row);
        }

        if (maxCards > 0) {
            const firstSlot = document.getElementById('slot0');
            if (firstSlot) firstSlot.classList.add('active-target');
        }

        const box = document.getElementById('prediction-text');
        if (box && !box.innerHTML.includes('Ваш личный прогноз')) {
            box.innerHTML = "Колода перемешана. Тяните карту.";
        }
    }

    function drawCard() {
    if (!currentMode || drawnCount >= maxCards || isAnimating) return;
    isAnimating = true;

    const deck = document.querySelector('.deck');
    const deckRect = deck.getBoundingClientRect();
    createParticles(deckRect.left + deckRect.width / 2, deckRect.top + deckRect.height / 2, '#a855f7');

    const slot = document.getElementById('slot' + drawnCount);
    const slotRect = slot.getBoundingClientRect();
    slot.classList.remove('active-target');

    // === ВЫБОР КАРТЫ С УЧЁТОМ ПЕРЕМЕШАННОГО ПОРЯДКА ===
    let cardData;
    const drawnIds = selectedCards.map(c => c.id);
    
    // Если есть перемешанная колода и она не пуста
    if (window.shuffledRemaining && window.shuffledRemaining.length > 0) {
        // Берём первую карту из перемешанной колоды
        cardData = window.shuffledRemaining[0];
        // Удаляем её из перемешанной колоды
        window.shuffledRemaining.shift();
    } else {
        // Fallback: выбираем случайную из доступных
        const availableCards = tarotDB.cards.filter(c => !drawnIds.includes(c.id));
        cardData = availableCards[Math.floor(Math.random() * availableCards.length)];
    }
    
    const isReversed = Math.random() < 0.25;
    const cardInstance = { ...cardData, isReversed };
    selectedCards.push(cardInstance);
    drawnCount++;

    const card = document.createElement('div');
    card.className = `card-anim`;
    
    const isLargeSlot = slot.classList.contains('large');
    
    card.style.position = 'fixed';
    card.style.zIndex = '1000';
    card.style.left = deckRect.left + 'px';
    card.style.top = deckRect.top + 'px';
    card.style.width = deckRect.width + 'px';
    card.style.height = deckRect.height + 'px';
    card.style.transition = 'all 0.8s cubic-bezier(0.23, 1, 0.32, 1)';

    card.innerHTML = `
        <div class="face back"></div>
        <div class="face front">
            <div class="card-emoji" style="transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);">${cardData.emoji}</div>
            <div class="card-name" style="transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);">${cardData.name}</div>
            ${isReversed ? '<div style="font-size: 6px; color: #ff4d4d; position: absolute; bottom: 5px; width:100%; text-align:center;">ПЕРЕВЕРНУТА</div>' : ''}
        </div>
    `;

    document.body.appendChild(card);
    updatePrediction();

    requestAnimationFrame(() => {
        card.style.left = slotRect.left + 'px';
        card.style.top = slotRect.top + 'px';
        card.style.width = slotRect.width + 'px';
        card.style.height = slotRect.height + 'px';
        
        if (isLargeSlot) {
            const emoji = card.querySelector('.card-emoji');
            const name = card.querySelector('.card-name');
            emoji.style.transform = 'scale(1.4)';
            name.style.transform = 'scale(1.2)';
        }
        
        if (isReversed) card.classList.add('is-reversed');
        card.classList.add('flipped');
    });

    setTimeout(() => {
        slot.appendChild(card);
        card.style.position = 'absolute';
        card.style.left = '0';
        card.style.top = '0';
        card.style.width = '100%';
        card.style.height = '100%';
        card.style.margin = '0';
        
        if (isLargeSlot) {
            const emoji = card.querySelector('.card-emoji');
            const name = card.querySelector('.card-name');
            emoji.style.transform = 'scale(1.4)';
            name.style.transform = 'scale(1.2)';
        }
        
        card.classList.add('arrived');
        card.onclick = () => showModal(cardInstance);
        createParticles(slotRect.left + slotRect.width / 2, slotRect.top + slotRect.height / 2, '#ec4899');
        
        const nextSlot = document.getElementById('slot' + drawnCount);
        if (nextSlot) nextSlot.classList.add('active-target');
        
        isAnimating = false;
    }, 800);
}
    
    function updatePrediction() {
        const box = document.getElementById('prediction-text');
        if (!box) return;
        
        const elementColors = { "Огонь": "#ff4d4d", "Вода": "#4db8ff", "Воздух": "#ffcc00", "Земля": "#4dff88" };
        const birthDate = localStorage.getItem('userBirthDate');
        let personalNote = "";
        let comboNote = "";

        if (birthDate) {
            const day = parseInt(birthDate.split('-')[2]);
            const lastCard = selectedCards[selectedCards.length - 1];
            if (lastCard) {
                if (lastCard.id === day || lastCard.id === (day % 22)) {
                    personalNote = `<div style="margin-top:10px; padding:10px; border:1px solid gold; background: rgba(255,215,0,0.1); border-radius:8px; color: gold; font-size: 0.75rem;">✨ <b>Мистическая связь:</b> Эта карта — ваш личный покровитель.</div>`;
                } else {
                    personalNote = `<div style="margin-top:10px; font-style: italic; opacity: 0.8; font-size: 0.7rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">🎯 Для рожденных ${day}-го числа...</div>`;
                }
            }
        }

        // === РАСШИРЕННЫЙ ПОИСК КОМБО ===
        if (selectedCards.length >= 2) {
            // 1. Комбо по ID карт (парные)
            for (let i = 0; i < selectedCards.length; i++) {
                for (let j = i + 1; j < selectedCards.length; j++) {
                    const id1 = selectedCards[i].id;
                    const id2 = selectedCards[j].id;
                    const found = tarotDB.combos[`${id1}+${id2}`] || tarotDB.combos[`${id2}+${id1}`];
                    if (found && !comboNote) comboNote = `<div style="margin-top:10px; padding:10px; border:1px solid #a855f7; background: rgba(168,85,247,0.1); border-radius:8px;">🔮 <b>Связка:</b> ${found}</div>`;
                }
            }
            
            // 2. ТРОЙНЫЕ комбо (если есть 3+ карты)
            if (selectedCards.length >= 3 && !comboNote) {
                const ids = selectedCards.map(c => c.id).sort();
                for (let i = 0; i < ids.length - 2; i++) {
                    for (let j = i + 1; j < ids.length - 1; j++) {
                        for (let k = j + 1; k < ids.length; k++) {
                            const tripleKey = `${ids[i]}+${ids[j]}+${ids[k]}`;
                            const tripleFound = tarotDB.combos[tripleKey];
                            if (tripleFound && !comboNote) {
                                comboNote = `<div style="margin-top:10px; padding:10px; border:1px solid #a855f7; background: rgba(168,85,247,0.1); border-radius:8px;">🔮 <b>Тройная связка:</b> ${tripleFound}</div>`;
                                break;
                            }
                        }
                        if (comboNote) break;
                    }
                    if (comboNote) break;
                }
            }
            
            // 3. Комбо с режимом
            if (!comboNote) {
                const modeCombo = tarotDB.combos[`mode_${currentMode}`];
                if (modeCombo) comboNote = `<div style="margin-top:10px; padding:10px; border:1px solid #a855f7; background: rgba(168,85,247,0.1); border-radius:8px;">🎴 <b>Режим:</b> ${modeCombo}</div>`;
            }
            
            // 4. Комбо с днём недели
            if (!comboNote) {
                const dayOfWeek = new Date().getDay();
                const dayNames = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
                const dayKey = dayNames[dayOfWeek];
                
                for (let card of selectedCards) {
                    const dayCombo = tarotDB.combos[`${dayKey}+${card.id}`];
                    if (dayCombo) {
                        comboNote = `<div style="margin-top:10px; padding:10px; border:1px solid #a855f7; background: rgba(168,85,247,0.1); border-radius:8px;">📅 <b>День недели:</b> ${dayCombo}</div>`;
                        break;
                    }
                }
            }
            
            // 5. Комбо с днём рождения
            if (!comboNote && birthDate) {
                const birthDay = parseInt(birthDate.split('-')[2]);
                for (let card of selectedCards) {
                    const birthdayCombo = tarotDB.combos[`birthday+${card.id}`];
                    if (birthdayCombo) {
                        comboNote = `<div style="margin-top:10px; padding:10px; border:1px solid gold; background: rgba(255,215,0,0.1); border-radius:8px;">🎂 <b>День рождения:</b> ${birthdayCombo}</div>`;
                        break;
                    }
                }
            }
            
            // 6. Временные комбо
            if (!comboNote) {
                const hour = new Date().getHours();
                let timeKey = '';
                if (hour >= 23 || hour <= 3) timeKey = 'midnight';
                else if (hour >= 5 && hour <= 8) timeKey = 'morning';
                else if (hour >= 12 && hour <= 14) timeKey = 'noon';
                
                if (timeKey) {
                    for (let card of selectedCards) {
                        const timeCombo = tarotDB.combos[`${timeKey}+${card.id}`];
                        if (timeCombo) {
                            comboNote = `<div style="margin-top:10px; padding:10px; border:1px solid #a855f7; background: rgba(168,85,247,0.1); border-radius:8px;">⏰ <b>Магический час:</b> ${timeCombo}</div>`;
                            break;
                        }
                    }
                }
            }
            
            // 7. Проверка specialCombos
            if (!comboNote) {
                for (let special of tarotDB.specialCombos) {
                    if (special.check(selectedCards, currentMode, new Date())) {
                        comboNote = `<div style="margin-top:10px; padding:10px; border:1px solid #ec4899; background: rgba(236,72,153,0.1); border-radius:8px;">✨ <b>${special.name}:</b> ${special.text}</div>`;
                        break;
                    }
                }
            }
        }

        let html = "";
        if (selectedCards.length > 0) {
            if (currentMode === 'day') {
                const last = selectedCards[0];
                html = `<div class="fade-in"><small>${last.keywords}</small><b>${last.name}</b><p>${last.isReversed ? last.advice_rev : last.advice}</p>${personalNote}${comboNote}</div>`;
            } else {
                const counts = {};
                selectedCards.forEach(c => counts[c.element] = (counts[c.element] || 0) + 1);
                const dominant = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                const color = elementColors[dominant] || "#fff";
                
                html = `<div class="fade-in"><div style="color: ${color}; font-weight: bold; font-size: 0.7rem;">📈 Стихия: ${dominant}</div><div style="font-size: 0.75rem; border-left: 3px solid ${color}; padding-left: 10px;">${tarotDB.elementalAdvice[dominant]}</div>${personalNote}${comboNote}</div>`;
            }
        }
        box.innerHTML = html;

        if (drawnCount >= maxCards && maxCards > 0) {
            document.getElementById('reset-btn').style.display = 'inline-block';
            document.getElementById('donate-btn').style.display = 'inline-block';
            if (typeof saveToHistory === 'function') saveToHistory();
        }
    }

    function saveToHistory() {
        if (drawnCount >= maxCards) {
            const history = {
                date: new Date().toISOString(),
                mode: currentMode,
                cards: selectedCards.map(c => ({ id: c.id, name: c.name, isReversed: c.isReversed }))
            };
            let saved = JSON.parse(localStorage.getItem('tarotHistory') || '[]');
            saved.unshift(history);
            if (saved.length > 10) saved.pop();
            localStorage.setItem('tarotHistory', JSON.stringify(saved));
        }
    }

    // === НОВАЯ РЕАЛИСТИЧНАЯ АНИМАЦИЯ ТАСОВКИ ===
    function shuffleAnimation() {
    if (isAnimating) return;
    
    const deck = document.querySelector('.deck');
    const rect = deck.getBoundingClientRect();
    
    // ===== РЕАЛЬНАЯ ПЕРЕТАСОВКА ОСТАВШИХСЯ КАРТ =====
    // 1. Получаем ID уже вытянутых карт
    const drawnIds = selectedCards.map(c => c.id);
    
    // 2. Получаем оставшиеся карты (которые ещё не выпали)
    const remainingCards = tarotDB.cards.filter(c => !drawnIds.includes(c.id));
    
    // 3. Перемешиваем оставшиеся карты (алгоритм Фишера-Йетса)
    for (let i = remainingCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [remainingCards[i], remainingCards[j]] = [remainingCards[j], remainingCards[i]];
    }
    
    // 4. Сохраняем перемешанный порядок в переменную (для следующих вытягиваний)
    window.shuffledRemaining = remainingCards;
    
    // 5. Визуальный эффект сжатия колоды
    deck.style.transform = 'scale(0.95)';
    deck.style.transition = 'transform 0.2s ease';
    
    setTimeout(() => {
        deck.style.transform = 'scale(1)';
    }, 200);
    
    // 6. Хаптик
    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    
    // 7. Визуальная анимация веера (только для оставшихся карт, чтобы показать перетасовку)
    const cardsCount = Math.min(8, remainingCards.length);
    const cards = [];
    
    for (let i = 0; i < cardsCount; i++) {
        const fakeCard = document.createElement('div');
        fakeCard.className = 'card-anim shuffle-card';
        fakeCard.style.position = 'fixed';
        fakeCard.style.left = rect.left + 'px';
        fakeCard.style.top = rect.top + 'px';
        fakeCard.style.width = rect.width + 'px';
        fakeCard.style.height = rect.height + 'px';
        fakeCard.style.zIndex = '900';
        fakeCard.style.opacity = '0';
        fakeCard.innerHTML = '<div class="face back"></div>';
        fakeCard.style.borderRadius = '10px';
        fakeCard.style.boxShadow = '0 0 10px rgba(168, 85, 247, 0.5)';
        
        // Добавляем текст "осталось X карт"
        if (i === 0 && remainingCards.length > 0) {
            const label = document.createElement('div');
            label.innerText = `${remainingCards.length}`;
            label.style.position = 'absolute';
            label.style.bottom = '5px';
            label.style.right = '5px';
            label.style.fontSize = '10px';
            label.style.color = '#a855f7';
            label.style.background = 'rgba(0,0,0,0.7)';
            label.style.padding = '2px 4px';
            label.style.borderRadius = '8px';
            fakeCard.appendChild(label);
        }
        
        document.body.appendChild(fakeCard);
        cards.push(fakeCard);
    }
    
    cards.forEach((card, index) => {
        setTimeout(() => {
            const angle = (index - cardsCount / 2) * 12;
            const rad = angle * Math.PI / 180;
            const offsetX = Math.sin(rad) * 60;
            const offsetY = -Math.abs(Math.cos(rad)) * 30 + 20;
            const rotation = angle * 0.8;
            
            card.style.transition = 'all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1)';
            card.style.opacity = '1';
            card.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(${rotation}deg)`;
            card.style.zIndex = 900 + index;
        }, index * 40);
    });
    
    setTimeout(() => {
        cards.forEach((card, index) => {
            setTimeout(() => {
                card.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                card.style.transform = 'translate(0px, 0px) rotate(0deg)';
                card.style.opacity = '0';
            }, index * 30);
        });
    }, 500);
    
    setTimeout(() => {
        deck.style.transform = 'scale(0.98)';
        deck.style.transition = 'transform 0.1s ease';
        
        setTimeout(() => {
            deck.style.transform = 'scale(1)';
        }, 100);
    }, 650);
    
    setTimeout(() => {
        createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, '#a855f7');
        
        cards.forEach(card => {
            setTimeout(() => card.remove(), 400);
        });
        
        // ===== СООБЩЕНИЕ =====
        const box = document.getElementById('prediction-text');
        if (box) {
            const remainingCount = remainingCards.length;
            box.innerHTML = `<div class="fade-in">🃏 Колода перемешана! ✨<br>Осталось ${remainingCount} карт в колоде.</div>`;
            setTimeout(() => {
                if (drawnCount < maxCards) {
                    // Восстанавливаем текст, но оставляем комбо если были
                    updatePrediction();
                }
            }, 2000);
        }
        
        isAnimating = false;
    }, 800);
}
    
    function showModal(card) {
        document.getElementById('m-emoji').innerText = card.emoji;
        document.getElementById('m-name').innerText = card.name + (card.isReversed ? ' (пер.)' : '');
        document.getElementById('m-desc').innerHTML = card.isReversed ? card.advice_rev : card.advice;
        document.getElementById('card-overlay').classList.add('active');
        if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function closeModal() { document.getElementById('card-overlay').classList.remove('active'); }

    document.getElementById('donate-btn').onclick = async function() {
        try {
            const res = await fetch('/api/get-invoice');
            const data = await res.json();
            if (tg && data.url) tg.openInvoice(data.url, (s) => { if(s==='paid') tg.showAlert('✨'); });
        } catch (e) { tg.showAlert('Ошибка'); }
    };
</script>
