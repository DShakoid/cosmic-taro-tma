
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Tarot v6 - Magic Returns</title>
    <link rel="icon" type="image/png" href="/icon_cosmic_taro128.png">
   
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/taro/tarotData.js"></script>
<style>
    :root {
        --purp: #a855f7;
        --pink: #ec4899;
        --bg: #050508;
        --glass: rgba(255, 255, 255, 0.03);
        --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
        --neon-pink: 0 0 20px rgba(236, 72, 153, 0.7);
    }
   
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; 
        background: var(--bg); 
        color: #f3e8ff;
        display: flex; 
        justify-content: center; 
        min-height: 100vh; 
        /* Убираем overflow: hidden; и заменяем на прокрутку по вертикали */
        overflow-x: hidden;
        overflow-y: auto; 
        user-select: none; 
        -webkit-user-select: none;
    }
    .stars {
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
        z-index: 1;
        pointer-events: none;
    }
    .container {
        position: relative; 
        z-index: 10; 
        width: 100%; 
        max-width: 400px;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        /* Увеличиваем нижний отступ, чтобы кнопки не прилипали к краю */
        padding: calc(env(safe-area-inset-top, 0px) + 55px) 15px 80px 15px;
        box-sizing: border-box;
        /* Разрешаем контейнеру расти вместе с контентом */
        min-height: 100%;
    }
    .menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; z-index: 100; }
    .menu-btn {
        background: var(--glass); border: 1px solid rgba(168, 85, 247, 0.2);
        color: rgba(255,255,255,0.6); padding: 10px 5px; border-radius: 12px;
        font-size: 0.7rem; flex: 1; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-btn.active {
        background: rgba(168, 85, 247, 0.15); color: white; border-color: var(--purp);
        box-shadow: var(--neon-purp);
    }
    .deck-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px; /* Отступ между колодой, текстом и кнопкой */
    margin-bottom: 20px;
}
    .deck {
        width: 65px; height: 95px;
        background-image: url('/taro/back_card.jpg'); background-size: cover; background-position: center;
        border: 2px solid var(--purp); border-radius: 10px; cursor: pointer;
        box-shadow: var(--neon-purp);
    }
    .deck:active { transform: scale(0.95); box-shadow: 0 0 5px var(--purp); }
    .table { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 15px 0; width: 100%; z-index: 5; }
    .table-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
   
    .slot {
        width: 75px; height: 110px; border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 10px; background: rgba(255,255,255,0.01); position: relative; transition: 0.3s;
    }
    .slot.large { width: 140px; height: 200px; }
    .slot.active-target { border-color: rgba(236, 72, 153, 0.4); box-shadow: 0 0 10px rgba(236, 72, 153, 0.2); }
    .card-anim { 
    position: fixed; 
    z-index: 500; 
    transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    transform-style: preserve-3d; 
    perspective: 1000px; /* Добавь перспективу для глубины */
    pointer-events: none;
    border-radius: 10px; 
}

    .card-anim.flipped { transform: rotateY(180deg); transition: transform 0.7s, left 0.8s, top 0.8s, width 0.8s, height 0.8s; }
    .card-anim.is-reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }
    .card-anim.arrived { box-shadow: var(--neon-pink); pointer-events: auto; }
    

    .face { 
        position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
        /* УБИРАЕМ border-radius отсюда */
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        box-sizing: border-box; 
        /* ФИКС УГОЛКОВ И ЗДЕСЬ ТОЖЕ */
        overflow: hidden; 
    }
    .face.back { background: #1e1b4b url('/taro/back_card.jpg') center/cover; border: 2px solid var(--purp); z-index: 2; }
    .face.front { background: #0f172a; border: 2px solid var(--pink); transform: rotateY(180deg); padding: 8px; z-index: 3; border-radius: 8px}
    /* Базовые стили содержания */
    .card-emoji { 
        font-size: 1.2rem; /* Фиксируем один размер */
        transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        display: block;
        will-change: transform;
    }
    .card-name { 
        font-size: 0.4rem; /* Фиксируем один размер */
        color: #f3e8ff; 
        margin-top: 5px; 
        text-transform: uppercase; 
        font-weight: 600; 
        text-align: center; 
        transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        will-change: transform;
    }
    /* Когда карта попадает в .large слот, контент плавно увеличивается */
    .slot.large .card-emoji { 
        transform: scale(1.4); 
    }
    .slot.large .card-name { 
        transform: scale(1.2); 
    }

    /* Если карта перевернута, сохраняем масштаб и добавляем поворот в JS или здесь */
    .card-anim.is-reversed .card-emoji,
    .card-anim.is-reversed .card-name {
        /* transform: scale(1) rotate(180deg); — если захочешь крутить только контент */
    }
    .prediction-box {
        width: 95%; background: rgba(20, 15, 30, 0.6); border-radius: 20px;
        padding: 18px; border: 1px solid rgba(168, 85, 247, 0.15);
        backdrop-filter: blur(15px); text-align: center; margin-top: 20px;
    }
    .overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(5px);
    }
    .overlay.active { display: flex; opacity: 1; }
    .modal-card {
        width: 85%; max-width: 320px; background: rgba(10, 7, 15, 0.95);
        border: 2px solid var(--purp); border-radius: 24px; padding: 25px;
        text-align: center; box-shadow: var(--neon-purp);
        transform: scale(0.9); transition: transform 0.3s ease;
    }
    .overlay.active .modal-card { transform: scale(1); }
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    .action-btn {
        background: var(--pink); border: none; color: white; padding: 10px 20px;
        border-radius: 12px; font-size: 0.75rem; font-weight: bold; cursor: pointer;
        transition: 0.2s; box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
    }
    #donate-btn { background: linear-gradient(45deg, #f59e0b, #d97706); }
   
    .particle {
        position: fixed; width: 5px; height: 5px; border-radius: 50%;
        pointer-events: none; opacity: 0; z-index: 1000;
        animation: particle-fly 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    @keyframes particle-fly {
        0% { transform: translate(0, 0) scale(1.5); opacity: 1; }
        100% { transform: translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px)) scale(0); opacity: 0; }
    }
   
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
   
    #prediction-text { font-size: 0.7rem; line-height: 1.5; color: #e2d5f5; }
    #prediction-text b { color: white; font-size: 0.8rem; text-transform: uppercase; }
    #prediction-text small { color: var(--purp); font-size: 0.75rem; letter-spacing: 1px; display: block; margin-bottom: 5px; }

    /* Тряска самой колоды */
@keyframes deck-shake {
    0% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(1.05) rotate(-2deg); }
    50% { transform: scale(1.05) rotate(2deg); }
    75% { transform: scale(1.05) rotate(-1deg); }
    100% { transform: scale(1) rotate(0deg); }
}

.deck-shaking {
    animation: deck-shake 0.3s ease-in-out infinite;
    box-shadow: var(--neon-purp);
}

/* Плавный вылет фантомных карт */
.shuffle-card {
    position: fixed;
    z-index: 999;
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
}

    .shuffle-btn {
    background: rgba(168, 85, 247, 0.1);
    border: 1px solid rgba(168, 85, 247, 0.3);
    color: var(--purp);
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    letter-spacing: 1px;
    text-transform: uppercase;
    backdrop-filter: blur(5px);
}

.shuffle-btn:hover {
    background: rgba(168, 85, 247, 0.2);
    box-shadow: var(--neon-purp);
    color: white;
}

.shuffle-btn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')">Совет</button>
        </div>
        <div class="deck-container">
    <div class="deck" onclick="drawCard()"></div>
    <div class="deck-label">ТЯНИ КАРТУ</div>
    <button class="shuffle-btn" onclick="shuffleAnimation()">
        <span>ПЕРЕМЕШАТЬ</span>
    </button>
</div>
        <div id="table" class="table"></div>
        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text" class="fade-in">Выберите режим и прикоснитесь к колоде</div>
            <div class="btn-row">
                <button id="reset-btn" onclick="setMode(currentMode)" style="display:none;" class="action-btn">ЗАНОВО</button>
                <button id="donate-btn" class="action-btn" style="display:none;">⭐ ПОБЛАГОДАРИТЬ</button>
            </div>
        </div>
    </div>

    <div id="card-overlay" class="overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="m-emoji" style="font-size: 60px; filter: drop-shadow(0 0 10px white);"></div>
            <div id="m-name" style="color: white; font-weight: bold; font-size: 1.3rem; margin: 10px 0;"></div>
            <div id="m-desc" style="font-size: 0.9rem; text-align: left; line-height: 1.5; color: #e2d5f5;"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; border-radius:12px; background:var(--purp); border:none; color:white; font-weight:bold; cursor:pointer; font-size:0.9rem; box-shadow:var(--neon-purp);">ПОНЯТНО</button>
        </div>
    </div>

<script>
    // 1. Инициализация переменных (ОДИН РАЗ)
    let currentMode = '';
    let drawnCount = 0;
    let maxCards = 0;
    let selectedCards = [];

    // 2. Настройка Telegram (ОДИН РАЗ)
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#050508');
        tg.setBackgroundColor('#050508');
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            window.location.href = '../index.html';
        });
    }

    // 3. Логика загрузки и режима дня рождения
    function generateBirthdayPrediction(date) {
        const day = date.split('-')[2];
        const box = document.getElementById('prediction-text');
        if (box) {
            box.innerHTML = `<h3>Ваш личный прогноз</h3><p>Для рожденных ${day}-го числа звезды подготовили особый совет. Тяните карту...</p>`;
        }
    }

    window.addEventListener('load', () => {
        const params = new URLSearchParams(window.location.search);
        
        // Устанавливаем режим по умолчанию (Карта дня)
        setMode('day');

        // Проверяем, пришел ли пользователь после оплаты даты
        if (params.get('mode') === 'birthday') {
            const date = localStorage.getItem('userBirthDate');
            if (date) {
                generateBirthdayPrediction(date);
            }
        }
    });

    // 4. Управление режимами раскладов
    function setMode(newMode) {
        currentMode = newMode;
        drawnCount = 0;
        selectedCards = [];
        const table = document.getElementById('table');
        if (!table) return;
        
        table.innerHTML = '';
        document.querySelectorAll('.card-anim').forEach(c => c.remove());
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        
        const activeBtn = document.getElementById('btn-' + newMode);
        if (activeBtn) activeBtn.classList.add('active');
        
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('donate-btn').style.display = 'none';

        if (newMode === 'day') { createRow(0, 1, true); maxCards = 1; }
        else if (newMode === 'week') { createRow(0, 4); createRow(4, 7); maxCards = 7; }
        else if (newMode === 'advice') { createRow(0, 3); createRow(3, 6); maxCards = 6; }

        function createRow(startId, endId, isLarge = false) {
            const row = document.createElement('div');
            row.className = 'table-row';
            for (let i = startId; i < endId; i++) {
                const s = document.createElement('div');
                s.className = 'slot' + (isLarge ? ' large' : '');
                s.id = 'slot' + i;
                row.appendChild(s);
            }
            table.appendChild(row);
        }

        if (maxCards > 0) {
            const firstSlot = document.getElementById('slot0');
            if (firstSlot) firstSlot.classList.add('active-target');
        }

        const box = document.getElementById('prediction-text');
        if (box && !box.innerHTML.includes('Ваш личный прогноз')) {
            box.innerHTML = "Колода перемешана. Тяните карту.";
        }
    }

    // 5. Вытягивание карты (Исправленная логика без скачков)

    function drawCard() {
    if (!currentMode || drawnCount >= maxCards) return;

    const deck = document.querySelector('.deck');
    const deckRect = deck.getBoundingClientRect();
    createParticles(deckRect.left + deckRect.width / 2, deckRect.top + deckRect.height / 2, '#a855f7');

    const slot = document.getElementById('slot' + drawnCount);
    const slotRect = slot.getBoundingClientRect();
    slot.classList.remove('active-target');

    const availableCards = tarotDB.cards.filter(c => !selectedCards.find(s => s.id === c.id));
    const cardData = availableCards[Math.floor(Math.random() * availableCards.length)];
    const isReversed = Math.random() < 0.25;
    const cardInstance = { ...cardData, isReversed };
    selectedCards.push(cardInstance);
    drawnCount++;

    const card = document.createElement('div');
    card.className = `card-anim`;
    
    // СТАРТ: фиксированные размеры
    card.style.position = 'fixed';
    card.style.zIndex = '1000';
    card.style.left = deckRect.left + 'px';
    card.style.top = deckRect.top + 'px';
    card.style.width = deckRect.width + 'px';
    card.style.height = deckRect.height + 'px';
    card.style.transition = 'all 0.8s cubic-bezier(0.23, 1, 0.32, 1)';

    card.innerHTML = `
        <div class="face back"></div>
        <div class="face front">
            <div class="card-emoji">${cardData.emoji}</div>
            <div class="card-name">${cardData.name}</div>
            ${isReversed ? '<div style="font-size: 6px; color: #ff4d4d; position: absolute; bottom: 5px; width:100%; text-align:center;">ПЕРЕВЕРНУТА</div>' : ''}
        </div>
    `;

    document.body.appendChild(card);
    updatePrediction();

    // ПОЛЕТ: тянем до размеров СЛОТА (будь то 75px или 140px)
    requestAnimationFrame(() => {
        card.style.left = slotRect.left + 'px';
        card.style.top = slotRect.top + 'px';
        card.style.width = slotRect.width + 'px';
        card.style.height = slotRect.height + 'px';
        if (isReversed) card.classList.add('is-reversed');
        card.classList.add('flipped'); // Тут включается scale(1.5) из CSS
    });

    // ПРИЗЕМЛЕНИЕ: 
   setTimeout(() => {
            // 1. Берем текущие координаты, чтобы не было прыжка при смене position
            const finalRect = card.getBoundingClientRect();
            
            card.style.transition = 'none';
            card.style.left = finalRect.left + 'px';
            card.style.top = finalRect.top + 'px';

            // 2. Перекидываем в слот
            slot.appendChild(card); 

            // 3. Сбрасываем в absolute, но даем браузеру "продышаться"
            requestAnimationFrame(() => {
                card.style.position = 'absolute';
                card.style.left = '0';
                card.style.top = '0';
                card.style.width = '100%';
                card.style.height = '100%';
                card.style.margin = '0';
                
                // 4. Вот теперь говорим, что она приземлилась
                // Только сейчас включится масштаб из CSS (плавно)
                requestAnimationFrame(() => {
                    card.classList.add('arrived');
                });
            });

            card.onclick = () => showModal(cardInstance);
            
            // Искра летит теперь СТРОГО после фиксации
            createParticles(slotRect.left + slotRect.width / 2, slotRect.top + slotRect.height / 2, '#ec4899');
            
            const nextSlot = document.getElementById('slot' + drawnCount);
            if (nextSlot) nextSlot.classList.add('active-target');
        }, 800);
}
    
    // 6. Обновление текста предсказания (с учетом даты)
    function updatePrediction() {
        const box = document.getElementById('prediction-text');
        if (!box) return;
        
        const elementColors = { "Огонь": "#ff4d4d", "Вода": "#4db8ff", "Воздух": "#ffcc00", "Земля": "#4dff88" };
        const birthDate = localStorage.getItem('userBirthDate');
        let personalNote = "";

        if (birthDate) {
            const day = parseInt(birthDate.split('-')[2]);
            const lastCard = selectedCards[selectedCards.length - 1];
            if (lastCard) {
                if (lastCard.id === day || lastCard.id === (day % 22)) {
                    personalNote = `<div style="margin-top:10px; padding:10px; border:1px solid gold; background: rgba(255,215,0,0.1); border-radius:8px; color: gold; font-size: 0.75rem;">✨ <b>Мистическая связь:</b> Эта карта — ваш личный покровитель.</div>`;
                } else {
                    personalNote = `<div style="margin-top:10px; font-style: italic; opacity: 0.8; font-size: 0.7rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">🎯 Для рожденных ${day}-го числа...</div>`;
                }
            }
        }

        let html = "";
        if (selectedCards.length > 0) {
            if (currentMode === 'day') {
                const last = selectedCards[0];
                html = `<div class="fade-in"><small>${last.keywords}</small><b>${last.name}</b><p>${last.isReversed ? last.advice_rev : last.advice}</p>${personalNote}</div>`;
            } else {
                const counts = {};
                selectedCards.forEach(c => counts[c.element] = (counts[c.element] || 0) + 1);
                const dominant = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                const color = elementColors[dominant] || "#fff";
                let comboNote = "";

                for (let i = 0; i < selectedCards.length; i++) {
                    for (let j = i + 1; j < selectedCards.length; j++) {
                        const id1 = selectedCards[i].id; const id2 = selectedCards[j].id;
                        const found = tarotDB.combos[`${id1}+${id2}`] || tarotDB.combos[`${id2}+${id1}`];
                        if (found) comboNote = `<div style="margin-top:10px; padding:10px; border:1px solid ${color}; background: rgba(255,255,255,0.05); border-radius:8px;">🔮 <b>Связка:</b> ${found}</div>`;
                    }
                }

                html = `<div class="fade-in"><div style="color: ${color}; font-weight: bold; font-size: 0.7rem;">📈 Стихия: ${dominant}</div><div style="font-size: 0.75rem; border-left: 3px solid ${color}; padding-left: 10px;">${tarotDB.elementalAdvice[dominant]}</div>${personalNote}${comboNote}</div>`;
            }
        }
        box.innerHTML = html;

        if (drawnCount >= maxCards && maxCards > 0) {
            document.getElementById('reset-btn').style.display = 'inline-block';
            document.getElementById('donate-btn').style.display = 'inline-block';
        }
    }    

    function shuffleAnimation() {
    const deck = document.querySelector('.deck');
    const rect = deck.getBoundingClientRect();
    
    // Включаем тряску колоды
    deck.classList.add('deck-shaking');

    // Создаем 6 вылетающих карт
    for (let i = 0; i < 6; i++) {
        setTimeout(() => {
            const faked = document.createElement('div');
            faked.className = 'card-anim shuffle-card';
            
            // Стартуем из колоды
            faked.style.left = rect.left + 'px';
            faked.style.top = rect.top + 'px';
            faked.style.width = rect.width + 'px';
            faked.style.height = rect.height + 'px';
            faked.innerHTML = '<div class="face back"></div>';
            
            document.body.appendChild(faked);

            // Генерируем случайный вылет
            const angle = (Math.random() * Math.PI * 2);
            const dist = 50 + Math.random() * 50;
            const x = Math.cos(angle) * dist;
            const y = Math.sin(angle) * dist;

            requestAnimationFrame(() => {
                faked.style.transform = `translate(${x}px, ${y}px) rotate(${x}deg)`;
                faked.style.opacity = '0';
            });

            // Удаляем карту после анимации
            setTimeout(() => faked.remove(), 600);
        }, i * 100);
    }

    // Выключаем тряску через секунду
    setTimeout(() => {
        deck.classList.remove('deck-shaking');
        // Тут можно добавить звук тасовки, если есть
    }, 1000);
}

    // 7. Вспомогательные функции (Частицы, Модалки, Донат)
    function createParticles(x, y, color) {
        for (let i = 0; i < 10; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px'; p.style.background = color;
            const a = Math.random() * Math.PI * 2, v = Math.random() * 50 + 20;
            p.style.setProperty('--dx', Math.cos(a) * v); p.style.setProperty('--dy', Math.sin(a) * v);
            document.body.appendChild(p); setTimeout(() => p.remove(), 800);
        }
    }
    
    function showModal(card) {
        document.getElementById('m-emoji').innerText = card.emoji;
        document.getElementById('m-name').innerText = card.name + (card.isReversed ? ' (пер.)' : '');
        document.getElementById('m-desc').innerHTML = card.isReversed ? card.advice_rev : card.advice;
        document.getElementById('card-overlay').classList.add('active');
        if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function closeModal() { document.getElementById('card-overlay').classList.remove('active'); }

    document.getElementById('donate-btn').onclick = async function() {
        try {
            const res = await fetch('/api/get-invoice');
            const data = await res.json();
            if (tg && data.url) tg.openInvoice(data.url, (s) => { if(s==='paid') tg.showAlert('✨'); });
        } catch (e) { tg.showAlert('Ошибка'); }
    };
</script>
