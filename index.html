<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Tarot v6</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="tarotData.js"></script>
<style>
    :root { 
        --purp: #a855f7; 
        --pink: #ec4899; 
        --bg: #050508; 
        --glass: rgba(255, 255, 255, 0.03);
        --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
        --neon-pink: 0 0 20px rgba(236, 72, 153, 0.7);
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; background: var(--bg); color: #f3e8ff;
        min-height: 100vh;
        overflow-x: hidden;
        user-select: none; -webkit-user-select: none;
    }

    .stars {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
        z-index: 1;
    }

    .container {
        position: relative; 
        z-index: 10; 
        width: 100%; 
        max-width: 450px;
        margin: 0 auto;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        /* Умные отступы для iPhone и Android */
        padding: calc(var(--tg-viewport-safe-area-inset-top, 0px) + 55px) 15px calc(var(--tg-viewport-safe-area-inset-bottom, 0px) + 20px) 15px;
        box-sizing: border-box;
        min-height: 100vh;
    }

    /* --- МЕНЮ --- */
    .menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; z-index: 100; }
    .menu-btn {
        background: var(--glass); border: 1px solid rgba(168, 85, 247, 0.2);
        color: rgba(255,255,255,0.6); padding: 12px 5px; border-radius: 14px; 
        font-size: 0.75rem; flex: 1; transition: 0.3s; cursor: pointer;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-btn.active { 
        background: rgba(168, 85, 247, 0.2); color: white; border-color: var(--purp);
        box-shadow: var(--neon-purp);
    }

    /* --- КОЛОДА --- */
    .deck-container { 
        display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; z-index: 50;
    }
    .deck {
        width: 70px; height: 105px; 
        background-image: url('back_card.jpg');
        background-size: cover; background-position: center;
        border: 2px solid var(--purp); border-radius: 12px; cursor: pointer;
        box-shadow: var(--neon-purp); transition: transform 0.1s;
    }
    .deck:active { transform: scale(0.92); }

    /* --- ТАБЛИЦА --- */
    .table { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; z-index: 5; }
    .table-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
    .slot {
        width: 75px; height: 110px; border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 10px; background: rgba(255,255,255,0.01); position: relative;
    }
    .slot.large { width: 150px; height: 220px; border-color: rgba(168, 85, 247, 0.3); }
    .slot.active-target { border-color: var(--pink); box-shadow: 0 0 15px rgba(236, 72, 153, 0.2); }

    /* --- КАРТЫ --- */
    .card-anim { 
        position: fixed; z-index: 500; 
        transition: left 0.6s cubic-bezier(0.23, 1, 0.32, 1), top 0.6s cubic-bezier(0.23, 1, 0.32, 1), width 0.6s, height 0.6s;
        transform-style: preserve-3d; pointer-events: none;
    }
    .card-anim.flipped { transform: rotateY(180deg); transition: transform 0.6s, left 0.6s, top 0.6s; }
    .card-anim.is-reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }
    .card-anim.arrived { box-shadow: var(--neon-pink); pointer-events: auto; }

    .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .face.back { background: #1e1b4b url('back_card.jpg') center/cover; border: 2px solid var(--purp); z-index: 2; }
    .face.front { background: #0f172a; border: 2px solid var(--pink); transform: rotateY(180deg); padding: 10px; text-align: center; z-index: 1; }

    .card-emoji { font-size: 30px; }
    .slot.large .card-emoji { font-size: 60px; }
    .card-name { font-size: 9px; color: white; margin-top: 8px; text-transform: uppercase; font-weight: bold; }

    .prediction-box {
        width: 100%; background: rgba(20, 15, 30, 0.7); border-radius: 24px;
        padding: 20px; border: 1px solid rgba(168, 85, 247, 0.2);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        text-align: center; margin-top: auto; margin-bottom: 10px;
    }

    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
    .action-btn { 
        background: var(--pink); border: none; color: white; padding: 12px 18px; 
        border-radius: 14px; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    #donate-btn { background: linear-gradient(45deg, #f59e0b, #d97706); box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4); }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .overlay.active { display: flex; }
    .modal-card { width: 85%; max-width: 340px; background: #0a070f; border: 2px solid var(--purp); border-radius: 28px; padding: 30px; text-align: center; }

    .particle { position: fixed; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; animation: particle-fly 0.8s forwards; z-index: 1000; }
    @keyframes particle-fly { 0% { transform: scale(1.5); opacity: 1; } 100% { transform: translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px)) scale(0); opacity: 0; } }
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')">Совет</button>
        </div>

        <div class="deck-container">
            <div class="deck" onclick="drawCard()"></div>
            <div style="color:var(--purp); font-size:0.65rem; margin-top:8px; letter-spacing:3px;">ТЯНИ КАРТУ</div>
        </div>

        <div id="table" class="table"></div>

        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text">Выберите режим и потяните карту</div>
            <div class="btn-row">
                <button id="reset-btn" onclick="setMode(currentMode)" style="display:none;" class="action-btn">ЗАНОВО</button>
                <button id="share-btn" onclick="tg.showAlert('Сделайте скриншот расклада')" style="display:none;" class="action-btn" style="background:rgba(168,85,247,0.1); border:1px solid var(--purp);">СКРИН</button>
                <button id="donate-btn" class="action-btn" style="display:none;">⭐ Поблагодарить</button>
            </div>
        </div>
    </div>

    <div id="card-overlay" class="overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="m-emoji" style="font-size: 70px;"></div>
            <div id="m-name" style="color:white; font-size:1.4rem; margin:15px 0; font-weight:bold;"></div>
            <div id="m-desc" style="font-size:0.95rem; line-height:1.6; color:#e2d5f5; text-align:left;"></div>
            <button onclick="closeModal()" style="margin-top:25px; width:100%; padding:15px; border-radius:15px; background:var(--purp); border:none; color:white; font-weight:bold;">ПОНЯТНО</button>
        </div>
    </div>

<script>
    let currentMode = '';
    let drawnCount = 0;
    let maxCards = 0;
    let selectedCards = [];

    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#050508');
        tg.setBackgroundColor('#050508');
    }

    function setMode(newMode) {
        currentMode = newMode;
        drawnCount = 0;
        selectedCards = [];
        const table = document.getElementById('table');
        table.innerHTML = '';
        document.querySelectorAll('.card-anim').forEach(c => c.remove());
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + newMode).classList.add('active');
        
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('share-btn').style.display = 'none';
        document.getElementById('donate-btn').style.display = 'none';

        if (newMode === 'day') { createRow(0, 1, true); maxCards = 1; }
        else if (newMode === 'week') { createRow(0, 4); createRow(4, 7); maxCards = 7; }
        else if (newMode === 'advice') { createRow(0, 3); createRow(3, 6); maxCards = 6; }

        function createRow(s, e, lg = false) {
            const row = document.createElement('div');
            row.className = 'table-row';
            for (let i = s; i < e; i++) {
                const sl = document.createElement('div');
                sl.className = 'slot' + (lg ? ' large' : '');
                sl.id = 'slot' + i;
                row.appendChild(sl);
            }
            table.appendChild(row);
        }
        document.getElementById('slot0').classList.add('active-target');
        document.getElementById('prediction-text').innerText = "Колода готова. Тяните карту.";
    }

    function drawCard() {
        if (!currentMode || drawnCount >= maxCards) return;
        const deck = document.querySelector('.deck');
        const dr = deck.getBoundingClientRect();
        const slot = document.getElementById('slot' + drawnCount);
        const sr = slot.getBoundingClientRect();
        slot.classList.remove('active-target');

        const cardData = tarotDB.cards.filter(c => !selectedCards.find(s => s.id === c.id))[Math.floor(Math.random() * 22)];
        const isRev = Math.random() < 0.25;
        const inst = { ...cardData, isReversed: isRev };
        selectedCards.push(inst);
        drawnCount++;

        const card = document.createElement('div');
        card.className = 'card-anim';
        card.style = `width:${dr.width}px; height:${dr.height}px; left:${dr.left}px; top:${dr.top}px;`;
        card.innerHTML = `<div class="face back"></div><div class="face front"><div class="card-emoji">${cardData.emoji}</div><div class="card-name">${cardData.name}</div></div>`;
        document.body.appendChild(card);

        requestAnimationFrame(() => {
            card.style.left = sr.left + 'px'; card.style.top = sr.top + 'px';
            card.style.width = sr.width + 'px'; card.style.height = sr.height + 'px';
            setTimeout(() => { if(isRev) card.classList.add('is-reversed'); card.classList.add('flipped'); }, 100);
        });

        setTimeout(() => {
            card.classList.add('arrived');
            card.onclick = () => showModal(inst);
            if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            updatePrediction();
            const next = document.getElementById('slot' + drawnCount);
            if(next) next.classList.add('active-target');
        }, 700);
    }

    function updatePrediction() {
        const txt = document.getElementById('prediction-text');
        if (currentMode === 'day') {
            const c = selectedCards[0];
            txt.innerHTML = `<b>${c.name}</b><br>${c.isReversed ? c.advice_rev : c.advice}`;
        } else {
            txt.innerText = drawnCount < maxCards ? `Тяните карту №${drawnCount + 1}` : "Расклад завершен";
        }
        if (drawnCount >= maxCards) {
            document.getElementById('reset-btn').style.display = 'inline-block';
            document.getElementById('share-btn').style.display = 'inline-block';
            document.getElementById('donate-btn').style.display = 'inline-block';
        }
    }

    document.getElementById('donate-btn').onclick = function() {
        if (tg) {
            tg.sendData(JSON.stringify({ action: "donate", stars: 50 }));
            tg.HapticFeedback?.notificationOccurred('success');
            tg.close();
        }
    };

    function showModal(c) {
        document.getElementById('m-emoji').innerText = c.emoji;
        document.getElementById('m-name').innerText = c.name + (c.isReversed ? ' (пер.)' : '');
        document.getElementById('m-desc').innerHTML = c.isReversed ? c.advice_rev : c.advice;
        document.getElementById('card-overlay').classList.add('active');
    }

    function closeModal() { document.getElementById('card-overlay').classList.remove('active'); }
    
    function createParticles(x, y, color) {
        for (let i = 0; i < 8; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px'; p.style.background = color;
            const a = Math.random() * 6.28; const v = 30 + Math.random() * 30;
            p.style.setProperty('--dx', Math.cos(a) * v); p.style.setProperty('--dy', Math.sin(a) * v);
            document.body.appendChild(p); setTimeout(() => p.remove(), 800);
        }
    }

    setMode('day');
</script>
</body>
</html>
