<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Tarot v6.3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="tarotData.js"></script>
<style>
    :root { --purp: #a855f7; --pink: #ec4899; --bg: #050508; --glass: rgba(255, 255, 255, 0.03); }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0; background: var(--bg); color: #f3e8ff;
        display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
        user-select: none; -webkit-user-select: none;
    }

    .stars {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
        z-index: 1;
    }

    .container {
        position: relative; z-index: 10; width: 100%; max-width: 400px;
        display: flex; flex-direction: column; align-items: center; 
        padding: calc(env(safe-area-inset-top, 0px) + 40px) 15px 20px 15px;
        box-sizing: border-box;
    }

    .menu { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; }
    .menu-btn {
        background: var(--glass); border: 1px solid rgba(168, 85, 247, 0.2);
        color: rgba(255,255,255,0.6); padding: 8px; border-radius: 12px; 
        font-size: 0.7rem; flex: 1; text-transform: uppercase; cursor: pointer;
    }
    .menu-btn.active { background: rgba(168, 85, 247, 0.15); color: white; border-color: var(--purp); }

    .deck-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
    .deck {
        width: 55px; height: 80px; background: #1e1b4b url('back_card.jpg') center/cover;
        border: 2px solid var(--purp); border-radius: 8px; cursor: pointer;
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
    }

    .table { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 10px 0; width: 100%; }
    .table-row { display: flex; justify-content: center; gap: 6px; width: 100%; }
    
    .slot {
        width: 70px; height: 100px; border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 8px; background: rgba(255,255,255,0.01); position: relative;
    }
    .slot.large { width: 120px; height: 170px; }
    .slot.active-target { border-color: var(--pink); box-shadow: 0 0 10px rgba(236, 72, 153, 0.3); }

    .card-anim { 
        position: fixed; z-index: 500; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        transform-style: preserve-3d; border-radius: 8px; overflow: hidden; pointer-events: none;
    }
    .card-anim.flipped { transform: rotateY(180deg); }
    .card-anim.is-reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }

    .face { 
        position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
        border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .face.back { background: #1e1b4b url('back_card.jpg') center/cover; border: 1.5px solid var(--purp); z-index: 2; }
    .face.front { background: #0f172a; border: 1.5px solid var(--pink); transform: rotateY(180deg); padding: 4px; z-index: 1; }

    .card-emoji { font-size: 18px; }
    .slot.large .card-emoji { font-size: 40px; }
    .card-name { font-size: 6px; color: #f3e8ff; margin-top: 3px; text-transform: uppercase; text-align: center; }
    .slot.large .card-name { font-size: 10px; }

    .prediction-box {
        width: 100%; background: rgba(20, 15, 30, 0.8);
        border-radius: 16px; padding: 12px; border: 1px solid rgba(168, 85, 247, 0.2);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        text-align: center; box-sizing: border-box; margin-top: 5px;
    }

    #prediction-text { font-size: 0.8rem; line-height: 1.3; }
    .card-result-item { 
        background: rgba(255,255,255,0.04); border-radius: 6px; padding: 6px; 
        margin-top: 6px; text-align: left; font-size: 0.7rem; border-left: 2px solid var(--pink);
    }

    .btn-row { display: flex; gap: 8px; margin-top: 12px; width: 100%; }
    .action-btn {
        flex: 1; padding: 10px; border-radius: 10px; font-size: 0.75rem; font-weight: bold;
        border: none; cursor: pointer; color: white; transition: 0.2s;
    }
    #reset-btn { background: var(--purp); }
    #donate-btn { background: linear-gradient(45deg, #f59e0b, #d97706); }

    .overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center;
        backdrop-filter: blur(5px);
    }
    .overlay.active { display: flex; }
    .modal-card { width: 80%; background: #0a070f; border: 2px solid var(--purp); border-radius: 20px; padding: 20px; text-align: center; }
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')">Совет</button>
        </div>

        <div class="deck-container">
            <div class="deck" onclick="drawCard()"></div>
            <div style="color:var(--purp); font-size:0.55rem; margin-top:4px;">ТЯНИ КАРТУ</div>
        </div>

        <div id="table" class="table"></div>

        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text">Выберите режим</div>
            <div class="btn-row" id="buttons" style="display:none;">
                <button id="reset-btn" onclick="setMode(currentMode)" class="action-btn">ЗАНОВО</button>
                <button id="donate-btn" onclick="handleDonate()" class="action-btn">⭐ СПАСИБО</button>
            </div>
        </div>
    </div>

    <div id="card-overlay" class="overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="m-emoji" style="font-size: 40px;"></div>
            <div id="m-name" style="color: white; font-weight: bold; margin: 10px 0; font-size: 1rem;"></div>
            <div id="m-desc" style="font-size: 0.8rem; text-align: left; color: #e2d5f5; line-height: 1.4;"></div>
            <button onclick="closeModal()" style="margin-top:15px; width:100%; padding:10px; border-radius:8px; background:var(--purp); color:white; border:none; font-weight:bold;">ОК</button>
        </div>
    </div>

<script>
    let currentMode = '';
    let drawnCount = 0;
    let maxCards = 0;
    let selectedCards = [];

    const tg = window.Telegram?.WebApp;

    function setMode(newMode) {
        currentMode = newMode;
        drawnCount = 0;
        selectedCards = [];
        const table = document.getElementById('table');
        table.innerHTML = '';
        document.querySelectorAll('.card-anim').forEach(c => c.remove());
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + newMode).classList.add('active');
        document.getElementById('buttons').style.display = 'none';

        if (newMode === 'day') { createRow(0, 1, true); maxCards = 1; }
        else if (newMode === 'week') { createRow(0, 4); createRow(4, 7); maxCards = 7; }
        else if (newMode === 'advice') { createRow(0, 3); createRow(3, 6); maxCards = 6; }

        function createRow(start, end, large = false) {
            const row = document.createElement('div'); row.className = 'table-row';
            for (let i = start; i < end; i++) {
                const s = document.createElement('div'); s.className = 'slot' + (large ? ' large' : '');
                s.id = 'slot' + i; row.appendChild(s);
            }
            table.appendChild(row);
        }
        document.getElementById('slot0').classList.add('active-target');
        document.getElementById('prediction-text').innerHTML = "Колода готова. Тяните карту.";
    }

    function drawCard() {
        if (!currentMode || drawnCount >= maxCards) return;

        const deck = document.querySelector('.deck');
        const deckRect = deck.getBoundingClientRect();
        const slot = document.getElementById('slot' + drawnCount);
        const slotRect = slot.getBoundingClientRect();
        
        slot.classList.remove('active-target');

        const cardData = tarotDB.cards[Math.floor(Math.random() * tarotDB.cards.length)];
        const isReversed = Math.random() < 0.2;
        const inst = { ...cardData, isReversed };
        selectedCards.push(inst);

        const card = document.createElement('div');
        card.className = 'card-anim';
        Object.assign(card.style, {
            width: deckRect.width+'px', height: deckRect.height+'px',
            left: deckRect.left+'px', top: deckRect.top+'px'
        });
        
        card.innerHTML = `
            <div class="face back"></div>
            <div class="face front">
                <div class="card-emoji">${cardData.emoji}</div>
                <div class="card-name">${cardData.name}</div>
            </div>
        `;
        document.body.appendChild(card);

        // Форсируем перерисовку для анимации
        card.offsetHeight; 

        Object.assign(card.style, {
            left: slotRect.left+'px', top: slotRect.top+'px',
            width: slotRect.width+'px', height: slotRect.height+'px'
        });

        setTimeout(() => {
            if(isReversed) card.classList.add('is-reversed');
            card.classList.add('flipped');
            card.style.pointerEvents = 'auto';
            card.onclick = () => showModal(inst);
        }, 600);

        drawnCount++;
        const next = document.getElementById('slot' + drawnCount);
        if(next) next.classList.add('active-target');
        
        updatePrediction();
    }

    function updatePrediction() {
        const text = document.getElementById('prediction-text');
        if (selectedCards.length === 0) return;

        if (currentMode === 'day') {
            const c = selectedCards[0];
            text.innerHTML = `<b>${c.name}</b><br><p style="margin:5px 0;">${c.isReversed?c.advice_rev:c.advice}</p>`;
        } else {
            const counts = {};
            selectedCards.forEach(c => counts[c.element] = (counts[c.element] || 0) + 1);
            let dom = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            
            let html = `<b style="color:var(--purp)">Доминанта: ${dom}</b><br><span style="font-size:0.7rem; opacity:0.8;">${tarotDB.elementalAdvice[dom]}</span>`;
            
            if (drawnCount === maxCards) {
                selectedCards.forEach((c, idx) => {
                    html += `<div class="card-result-item">
                        <b>${idx+1}. ${c.name}</b>: ${c.isReversed ? c.advice_rev.split('.')[0] : c.advice.split('.')[0]}.
                    </div>`;
                });
            } else {
                html += `<p style="color:var(--pink); margin:5px 0;">Карта ${drawnCount} из ${maxCards}...</p>`;
            }
            text.innerHTML = html;
        }
        
        if (drawnCount >= maxCards) {
            document.getElementById('buttons').style.display = 'flex';
        }
    }

    function handleDonate() {
        if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        // Здесь твоя логика оплаты
        alert('Спасибо! Кнопка оплаты будет здесь.');
    }

    function showModal(card) {
        document.getElementById('m-emoji').innerText = card.emoji;
        document.getElementById('m-name').innerText = card.name + (card.isReversed ? ' (пер.)' : '');
        document.getElementById('m-desc').innerHTML = card.isReversed ? card.advice_rev : card.advice;
        document.getElementById('card-overlay').classList.add('active');
    }

    function closeModal() { document.getElementById('card-overlay').classList.remove('active'); }
    
    // Инициализация
    setMode('day');
</script>
</body>
</html>
