<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="icon_cosmic_taro128.png">
    <title>Cosmic Tarot - Welcome</title>
    <style>
        :root {
            --purp: #a855f7;
            --bg: #050508;
            --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
        }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        .stars {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
            z-index: 1;
        }
        
        #fireflies-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .welcome-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        
        h1 {
            font-size: 2.5rem;
            color: var(--purp);
            text-shadow: var(--neon-purp);
            margin-bottom: 5px;
            margin-top: 0;
        }
        
        .subtitle {
            margin-bottom: 30px;
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        .btn {
            box-sizing: border-box;
            width: 280px;
            padding: 18px; /* Чуть уменьшил для баланса */
            margin: 8px 0;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid var(--purp);
            color: white;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: var(--neon-purp);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            outline: none;
        }

        /* Стили для инпута даты */
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
            color-scheme: dark; /* Делает иконку календаря светлой */
            font-size: 1rem;
            text-align: center;
        }

        #date-modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 100; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #1a0b2e; 
            padding: 30px 20px; 
            border-radius: 25px; 
            border: 1px solid var(--purp); 
            text-align: center; 
            width: 100%;
            max-width: 320px;
            box-shadow: var(--neon-purp);
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <canvas id="fireflies-canvas"></canvas>
    
    <div class="welcome-card">
        <h1>COSMIC TARO</h1>
        <p class="subtitle">Выберите инструмент предсказания</p>
        
        <a href="taro/index.html" class="btn">
            <span>🔮</span> КАРТЫ ТАРО
        </a>
        
        <div class="btn disabled">
            <span>ᚱ</span> РУНЫ (СКОРО)
        </div>

        <button onclick="openDateModal()" class="btn" style="background: rgba(236, 72, 153, 0.1); border-color: #ec4899; box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);">
            <span>📅</span> ПРОГНОЗ ПО ДАТЕ (50 ⭐)
        </button>
    </div>

    <div id="date-modal" onclick="if(event.target === this) closeDateModal()">
        <div class="modal-content">
            <h3 style="margin-top: 0; margin-bottom: 20px;">Ваша дата рождения</h3>
            <input type="date" id="birth-date" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--purp); background: #050508; color: white; margin-bottom: 20px; box-sizing: border-box;">
            
            <button onclick="processPayment()" class="btn" style="width: 100%; margin: 0; background: #ec4899; border: none;">ОПЛАТИТЬ 50 ⭐</button>
            
            <div onclick="closeDateModal()" style="color: gray; margin-top: 20px; cursor: pointer; font-size: 0.9rem;">Отмена</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.ready();
            tg.expand();
            // Проверка на поддержку методов перед вызовом
            if (tg.setHeaderColor) tg.setHeaderColor('#050508');
            if (tg.setBackgroundColor) tg.setBackgroundColor('#050508');
        }

        // --- CANVAS (без изменений) ---
        const canvas = document.getElementById('fireflies-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, fireflies = [];
        const config = { quantity: 50, size: { min: 0.5, max: 2 }, speed: { min: 0.1, max: 0.5 }, color: '#d4a1f9' };

        function setCanvasSize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Firefly {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.r = Math.random() * (config.size.max - config.size.min) + config.size.min;
                this.vx = (Math.random() - 0.5) * config.speed.max;
                this.vy = (Math.random() - 0.5) * config.speed.max;
                this.alpha = Math.random() * 0.5 + 0.1;
                this.fadeRate = Math.random() * 0.01 + 0.005;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2, false);
                ctx.fillStyle = config.color;
                ctx.fill();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.alpha += this.fadeRate;
                if (this.alpha > 0.8 || this.alpha < 0.05) this.fadeRate = -this.fadeRate;
                if (this.x > width + this.r) this.x = -this.r;
                else if (this.x < -this.r) this.x = width + this.r;
                if (this.y > height + this.r) this.y = -this.r;
                else if (this.y < -this.r) this.y = height + this.r;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            fireflies.forEach(f => { f.update(); f.draw(); });
            requestAnimationFrame(animate);
        }

        setCanvasSize();
        for(let i=0; i<config.quantity; i++) fireflies.push(new Firefly());
        animate();
        window.addEventListener('resize', setCanvasSize);

        // --- ЛОГИКА МОДАЛКИ ---
        function openDateModal() {
            document.getElementById('date-modal').style.display = 'flex';
        }

        function closeDateModal() {
            document.getElementById('date-modal').style.display = 'none';
        }

        async function processPayment() {
            const birthDate = document.getElementById('birth-date').value;
            if (!birthDate) {
                if (tg?.showAlert) tg.showAlert("Пожалуйста, выберите дату");
                else alert("Пожалуйста, выберите дату");
                return;
            }

            if (birthDate === "2026-01-01") {
                localStorage.setItem('userBirthDate', birthDate);
                window.location.href = 'taro/index.html?mode=birthday';
                return; 
            }

            try {
                const res = await fetch('/api/get-invoice?type=birthday');
                const data = await res.json();
                if (tg?.openInvoice && data.url) {
                    tg.openInvoice(data.url, (status) => {
                        if (status === 'paid') {
                            localStorage.setItem('userBirthDate', birthDate);
                            window.location.href = 'taro/index.html?mode=birthday';
                        }
                    });
                } else {
                    // Если тестим в браузере
                    console.log("Invoice URL:", data.url);
                    alert("Оплата инициирована (только в Telegram)");
                }
            } catch (e) {
                if (tg?.showAlert) tg.showAlert("Ошибка оплаты");
                else console.error(e);
            }
        }
    </script>
</body>
</html>
