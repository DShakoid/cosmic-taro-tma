<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Tarot Classic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="tarotData.js"></script>
<style>
    :root { 
        --purp: #a855f7; 
        --pink: #ec4899; 
        --bg: #050508; 
        --glass: rgba(255, 255, 255, 0.03);
        --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
        --neon-pink: 0 0 20px rgba(236, 72, 153, 0.7);
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; background: var(--bg); color: #f3e8ff;
        display: flex; justify-content: center; min-height: 100vh; overflow: hidden;
        user-select: none; -webkit-user-select: none;
    }

    .stars {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
        z-index: 1;
    }

    .container {
        position: relative; 
        z-index: 10; 
        width: 100%; 
        max-width: 400px;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        /* ТОТ САМЫЙ ФИКС ОТСТУПА — остальное как было */
        padding: calc(env(safe-area-inset-top, 0px) + 50px) 15px 30px 15px;
        box-sizing: border-box;
    }

    .menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; z-index: 100; }
    .menu-btn {
        background: var(--glass); border: 1px solid rgba(168, 85, 247, 0.2);
        color: rgba(255,255,255,0.6); padding: 10px 5px; border-radius: 12px; 
        font-size: 0.7rem; flex: 1; transition: 0.3s; cursor: pointer;
        backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-btn.active { 
        background: rgba(168, 85, 247, 0.15); color: white; border-color: var(--purp);
        box-shadow: var(--neon-purp);
    }

    .deck-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; z-index: 50; }
    .deck {
        width: 65px; height: 95px; 
        background-image: url('back_card.jpg'); background-size: cover; background-position: center;
        border: 2px solid var(--purp); border-radius: 10px; cursor: pointer;
        box-shadow: var(--neon-purp);
    }

    .table { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 15px 0; width: 100%; z-index: 5; }
    .table-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
    
    .slot {
        width: 75px; height: 110px; border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 10px; background: rgba(255,255,255,0.01); position: relative;
    }
    .slot.large { width: 140px; height: 200px; }
    .slot.active-target { border-color: rgba(236, 72, 153, 0.4); box-shadow: 0 0 10px rgba(236, 72, 153, 0.2); }

    .card-anim { 
        position: fixed; z-index: 500; 
        transition: left 0.8s cubic-bezier(0.23, 1, 0.32, 1), top 0.8s cubic-bezier(0.23, 1, 0.32, 1), 
                    width 0.8s cubic-bezier(0.23, 1, 0.32, 1), height 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        transform-style: preserve-3d; pointer-events: none;
    }
    .card-anim.flipped { transform: rotateY(180deg); transition: transform 0.7s, left 0.8s, top 0.8s; }
    .card-anim.is-reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }
    
    .face { 
        position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
        border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .face.back { background: #1e1b4b url('back_card.jpg') center/cover; border: 2px solid var(--purp); }
    .face.front { background: #0f172a; border: 2px solid var(--pink); transform: rotateY(180deg); padding: 8px; }

    .card-emoji { font-size: 24px; }
    .slot.large .card-emoji { font-size: 50px; }
    .card-name { font-size: 8px; color: #f3e8ff; margin-top: 5px; text-transform: uppercase; font-weight: 600; text-align: center; }
    .slot.large .card-name { font-size: 12px; }

    .prediction-box {
        width: 100%; background: rgba(20, 15, 30, 0.6); border-radius: 20px;
        padding: 18px; border: 1px solid rgba(168, 85, 247, 0.15);
        backdrop-filter: blur(15px); text-align: center; margin-top: 20px;
    }

    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    .action-btn { background: var(--pink); border: none; color: white; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')">Совет</button>
        </div>
        <div class="deck-container">
            <div class="deck" onclick="drawCard()"></div>
            <div style="font-size: 0.6rem; color: var(--purp); margin-top: 5px; letter-spacing: 2px;">ТЯНИ КАРТУ</div>
        </div>
        <div id="table" class="table"></div>
        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text">Колода перемешана.</div>
            <div class="btn-row">
                <button id="reset-btn" onclick="setMode(currentMode)" style="display:none;" class="action-btn">ЗАНОВО</button>
            </div>
        </div>
    </div>
<script>
    const tg = window.Telegram?.WebApp;
    let currentMode = ''; let drawnCount = 0; let maxCards = 0;
    if(tg) { tg.ready(); tg.expand(); }

    function setMode(mode) {
        currentMode = mode; drawnCount = 0;
        const table = document.getElementById('table');
        table.innerHTML = '';
        document.querySelectorAll('.card-anim').forEach(c => c.remove());
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        document.getElementById('reset-btn').style.display = 'none';

        if (mode === 'day') { createRow(0, 1, true); maxCards = 1; }
        else if (mode === 'week') { createRow(0, 4); createRow(4, 7); maxCards = 7; }
        else if (mode === 'advice') { createRow(0, 3); createRow(3, 6); maxCards = 6; }

        function createRow(s, e, lg = false) {
            const row = document.createElement('div'); row.className = 'table-row';
            for (let i = s; i < e; i++) {
                const sl = document.createElement('div'); sl.className = 'slot' + (lg ? ' large' : '');
                sl.id = 'slot' + i; row.appendChild(sl);
            }
            table.appendChild(row);
        }
        document.getElementById('slot0').classList.add('active-target');
    }

    function drawCard() {
        if (!currentMode || drawnCount >= maxCards) return;
        const slot = document.getElementById('slot' + drawnCount);
        const sr = slot.getBoundingClientRect();
        const deckPos = document.querySelector('.deck').getBoundingClientRect();
        const cardData = tarotDB.cards[Math.floor(Math.random() * tarotDB.cards.length)];
        const isRev = Math.random() < 0.25;

        const card = document.createElement('div');
        card.className = 'card-anim';
        card.style = `width:${deckPos.width}px; height:${deckPos.height}px; left:${deckPos.left}px; top:${deckPos.top}px;`;
        card.innerHTML = `<div class="face back"></div><div class="face front"><div class="card-emoji">${cardData.emoji}</div><div class="card-name">${cardData.name}</div></div>`;
        document.body.appendChild(card);

        setTimeout(() => {
            card.style.left = sr.left + 'px'; card.style.top = sr.top + 'px';
            card.style.width = sr.width + 'px'; card.style.height = sr.height + 'px';
            setTimeout(() => { 
                if(isRev) card.classList.add('is-reversed'); 
                card.classList.add('flipped'); 
                if (drawnCount === maxCards) document.getElementById('reset-btn').style.display = 'block';
            }, 200);
        }, 50);
        drawnCount++;
        slot.classList.remove('active-target');
        const next = document.getElementById('slot' + drawnCount);
        if(next) next.classList.add('active-target');
    }
    setMode('day');
</script>
</body>
</html>
