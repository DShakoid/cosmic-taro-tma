<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cosmic Tarot</title>

    <link rel="preload" as="image" href="icon_cosmic_taro128.png">
    <link rel="stylesheet" href="/common/style.css">

                                <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path d="M19 12H5M12 19l-7-7 7-7" stroke="url(#cosmic-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>

            </div>

           <div class="header-center">
