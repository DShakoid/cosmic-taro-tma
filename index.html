<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="icon_cosmic_taro128.png">
    <title>Cosmic Tarot - Welcome</title>
    <style>
        :root {
            --purp: #a855f7;
            --bg: #050508;
            --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
        }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .stars {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
            z-index: 1;
        }
        .welcome-card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
    width: 100%; /* Занимаем всю ширину для точного центра */
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center; /* Центрируем дочерние элементы по горизонтали */
}

        h1 {
            font-size: 2.5rem;
            color: var(--purp);
            text-shadow: var(--neon-purp);
            margin-bottom: 10px;
        }
        .btn {
            box-sizing: border-box; /* Чтобы padding не раздувал ширину */
    width: 280px; /* Фиксированная ширина сделает кнопки одинаковыми */
    margin: 10px 0; /* Убираем лишние отступы по бокам */
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid var(--purp);
            color: white;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: var(--neon-purp);
        }
        .btn:active { transform: scale(0.98); }
        .btn.disabled {
            opacity: 0.4;
            box-shadow: none;
            border-color: #444;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div style="display: flex; justify-content: center; gap: 10px; width: 100%; margin-top: 15px;">
    <button id="reset-btn" class="menu-btn" style="flex: 1; max-width: 150px;">ЗАНОВО</button>
    <button id="donate-btn" class="menu-btn" style="flex: 1; max-width: 150px; background: orange;">⭐ ПОБЛАГОДАРИТЬ</button>
</div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
    </script>
</body>
</html>
