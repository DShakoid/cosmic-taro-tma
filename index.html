<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Tarot v6.4</title>
    <link rel="icon" type="image/png" href="icon_cosmic_taro128.png">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="tarotData.js"></script>
<style>
    :root { 
        --purp: #a855f7; 
        --pink: #ec4899; 
        --bg: #050508; 
        --glass: rgba(255, 255, 255, 0.03);
        --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; background: var(--bg); color: #f3e8ff;
        display: flex; justify-content: center; min-height: 100vh; overflow: hidden;
        user-select: none; -webkit-user-select: none;
    }

    .stars {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
        z-index: 1;
    }

    .container {
        position: relative; z-index: 10; width: 100%; max-width: 400px;
        display: flex; flex-direction: column; align-items: center; 
        padding: calc(env(safe-area-inset-top, 0px) + 55px) 15px 30px 15px;
        box-sizing: border-box;
    }

    .menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; z-index: 100; }
    .menu-btn {
        background: var(--glass); border: 1px solid rgba(168, 85, 247, 0.2);
        color: rgba(255,255,255,0.6); padding: 10px 5px; border-radius: 12px; 
        font-size: 0.7rem; flex: 1; transition: 0.3s; cursor: pointer;
        backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-btn.active { 
        background: rgba(168, 85, 247, 0.15); color: white; border-color: var(--purp);
        box-shadow: var(--neon-purp);
    }

    .deck-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; z-index: 50; }
    .deck {
        width: 65px; height: 95px; 
        background-image: url('back_card.jpg'); background-size: cover; background-position: center;
        border: 2px solid var(--purp); border-radius: 10px; cursor: pointer;
        box-shadow: var(--neon-purp);
    }

    .table { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 15px 0; width: 100%; z-index: 5; }
    .table-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
    
    .slot {
        width: 75px; height: 110px; border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 10px; background: rgba(255,255,255,0.01); position: relative; transition: 0.3s;
    }
    .slot.large { width: 140px; height: 200px; }
    .slot.active-target { border-color: var(--pink); box-shadow: 0 0 10px rgba(236, 72, 153, 0.2); }

    .card-anim { 
        position: fixed; z-index: 500; 
        transition: left 0.8s cubic-bezier(0.23, 1, 0.32, 1), top 0.8s cubic-bezier(0.23, 1, 0.32, 1), 
                    width 0.8s cubic-bezier(0.23, 1, 0.32, 1), height 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        transform-style: preserve-3d; pointer-events: none; border-radius: 10px; overflow: hidden;
    }
    .card-anim.flipped { transform: rotateY(180deg); transition: transform 0.7s, left 0.8s, top 0.8s, width 0.8s, height 0.8s; }
    .card-anim.is-reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }
    .card-anim.arrived { pointer-events: auto; box-shadow: 0 0 15px var(--pink); }

    .face { 
        position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
        border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .face.back { background: #1e1b4b url('back_card.jpg') center/cover; border: 2px solid var(--purp); z-index: 2; }
    .face.front { background: #0f172a; border: 2px solid var(--pink); transform: rotateY(180deg); padding: 8px; z-index: 1; }

    .card-emoji { font-size: 24px; }
    .slot.large .card-emoji { font-size: 50px; }
    .card-name { font-size: 8px; color: #f3e8ff; margin-top: 5px; text-transform: uppercase; font-weight: 600; text-align: center; }
    .slot.large .card-name { font-size: 12px; }

    .prediction-box {
        width: 92%; max-width: 360px; margin: 20px auto; 
        background: rgba(20, 15, 30, 0.7); border-radius: 20px; padding: 18px;
        border: 1px solid rgba(168, 85, 247, 0.15); backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px); text-align: center; box-sizing: border-box;
    }

    .card-result-item { 
        background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; 
        margin-top: 10px; text-align: left; font-size: 0.8rem; border-left: 3px solid var(--pink);
    }

    .btn-row { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 15px; width: 100%; }
    .action-btn {
        width: 100%; max-width: 260px; padding: 12px; border-radius: 12px; font-size: 0.85rem;
        font-weight: bold; cursor: pointer; border: none; color: white; transition: 0.2s;
    }
    #reset-btn { background: var(--pink); }
    #donate-btn { background: linear-gradient(45deg, #f59e0b, #d97706); }

    .overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center;
        backdrop-filter: blur(5px);
    }
    .overlay.active { display: flex; }
    .modal-card { width: 85%; max-width: 320px; background: #0a070f; border: 2px solid var(--purp); border-radius: 24px; padding: 25px; text-align: center; }
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')">Совет</button>
        </div>

        <div class="deck-container">
            <div class="deck" onclick="drawCard()"></div>
            <div style="color:var(--purp); font-size:0.6rem; margin-top:5px; letter-spacing:2px;">ТЯНИ КАРТУ</div>
        </div>

        <div id="table" class="table"></div>

        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text">Выберите режим</div>
            <div class="btn-row">
                <button id="reset-btn" onclick="setMode(currentMode)" style="display:none;" class="action-btn">ЗАНОВО</button>
                <button id="donate-btn" class="action-btn" style="display:none;">⭐ ПОБЛАГОДАРИТЬ</button>
            </div>
        </div>
    </div>

    <div id="card-overlay" class="overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="m-emoji" style="font-size: 60px;"></div>
            <div id="m-name" style="color: white; font-weight: bold; font-size: 1.3rem; margin: 10px 0;"></div>
            <div id="m-desc" style="font-size: 0.9rem; text-align: left; line-height: 1.5; color: #e2d5f5;"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; border-radius:12px; background:var(--purp); border:none; color:white; font-weight:bold;">ПОНЯТНО</button>
        </div>
    </div>

<script>
    let currentMode = '';
    let drawnCount = 0;
    let maxCards = 0;
    let selectedCards = [];

    function setMode(newMode) {
        currentMode = newMode;
        drawnCount = 0;
        selectedCards = [];
        const table = document.getElementById('table');
        table.innerHTML = '';
        document.querySelectorAll('.card-anim').forEach(c => c.remove());
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + newMode).classList.add('active');
        
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('donate-btn').style.display = 'none';

        if (newMode === 'day') { createRow(0, 1, true); maxCards = 1; }
        else if (newMode === 'week') { createRow(0, 4); createRow(4, 7); maxCards = 7; }
        else if (newMode === 'advice') { createRow(0, 3); createRow(3, 6); maxCards = 6; }

        function createRow(s, e, lg = false) {
            const r = document.createElement('div'); r.className = 'table-row';
            for (let i = s; i < e; i++) {
                const sl = document.createElement('div'); sl.className = 'slot' + (lg ? ' large' : '');
                sl.id = 'slot' + i; r.appendChild(sl);
            }
            table.appendChild(r);
        }
        document.getElementById('slot0').classList.add('active-target');
        document.getElementById('prediction-text').innerHTML = "Колода перемешана. Тяните карту.";
    }

    function drawCard() {
        if (!currentMode || drawnCount >= maxCards) return;

        const deck = document.querySelector('.deck');
        const dRect = deck.getBoundingClientRect();
        const slot = document.getElementById('slot' + drawnCount);
        const sRect = slot.getBoundingClientRect();
        
        slot.classList.remove('active-target');

        const cardData = tarotDB.cards[Math.floor(Math.random() * tarotDB.cards.length)];
        const isRev = Math.random() < 0.25;
        const inst = { ...cardData, isReversed: isRev };
        selectedCards.push(inst);

        const card = document.createElement('div');
        card.className = 'card-anim';
        card.style.width = dRect.width + 'px';
        card.style.height = dRect.height + 'px';
        card.style.left = dRect.left + 'px';
        card.style.top = dRect.top + 'px';
        
        card.innerHTML = `
            <div class="face back"></div>
            <div class="face front">
                <div class="card-emoji">${cardData.emoji}</div>
                <div class="card-name">${cardData.name}</div>
            </div>
        `;
        document.body.appendChild(card);

        requestAnimationFrame(() => {
            card.style.left = sRect.left + 'px';
            card.style.top = sRect.top + 'px';
            card.style.width = sRect.width + 'px';
            card.style.height = sRect.height + 'px';
            setTimeout(() => {
                if (isRev) card.classList.add('is-reversed');
                card.classList.add('flipped');
            }, 150);
        });

        drawnCount++;
        setTimeout(() => {
            card.classList.add('arrived');
            card.onclick = () => showModal(inst);
            const next = document.getElementById('slot' + drawnCount);
            if (next) next.classList.add('active-target');
            updatePrediction();
        }, 800);
    }

    function updatePrediction() {
        const text = document.getElementById('prediction-text');
        if (selectedCards.length === 0) return;

        if (currentMode === 'day') {
            const c = selectedCards[0];
            text.innerHTML = `<b>${c.name}</b><p>${c.isReversed ? c.advice_rev : c.advice}</p>`;
        } else {
            const counts = {};
            selectedCards.forEach(c => counts[c.element] = (counts[c.element] || 0) + 1);
            let dom = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            let html = `<b>Доминанта: ${dom}</b><br><small>${tarotDB.elementalAdvice[dom]}</small>`;
            
            if (drawnCount === maxCards) {
                selectedCards.forEach((c, i) => {
                    html += `<div class="card-result-item"><b>${i+1}. ${c.name}</b> — ${c.isReversed ? c.advice_rev.substring(0, 60) : c.advice.substring(0, 60)}...</div>`;
                });
            }
            text.innerHTML = html;
        }
        
        if (drawnCount >= maxCards) {
            document.getElementById('reset-btn').style.display = 'block';
            document.getElementById('donate-btn').style.display = 'block';
        }
    }

    function showModal(c) {
        document.getElementById('m-emoji').innerText = c.emoji;
        document.getElementById('m-name').innerText = c.name + (c.isReversed ? ' (пер.)' : '');
        document.getElementById('m-desc').innerHTML = c.isReversed ? c.advice_rev : c.advice;
        document.getElementById('card-overlay').classList.add('active');
    }

    function closeModal() { document.getElementById('card-overlay').classList.remove('active'); }
    setMode('day');
</script>
</body>
</html>
