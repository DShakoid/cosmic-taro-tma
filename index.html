<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="icon_cosmic_taro128.png">
    <link rel="preload" as="image" href="icon_cosmic_taro128.png">
    <title>Cosmic Tarot - Welcome</title>
    <style>
        :root {
            --purp: #a855f7;
            --pink: #ec4899;
            --bg: #050508;
            --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
            --neon-pink: 0 0 15px rgba(236, 72, 153, 0.4);
        }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .stars {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
            z-index: 1;
        }
        
        #fireflies-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .welcome-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            animation: fadeInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--purp) 0%, var(--pink) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: var(--neon-purp);
            margin-bottom: 5px;
            margin-top: 0;
            letter-spacing: 2px;
        }
        
        .subtitle {
            margin-bottom: 30px;
            opacity: 0.8;
            font-size: 0.9rem;
            color: #c4b5fd;
        }
        
        .btn {
            box-sizing: border-box;
            width: 280px;
            padding: 18px;
            margin: 8px 0;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid var(--purp);
            color: white;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: var(--neon-purp);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            outline: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:active::before {
            width: 300px;
            height: 300px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn:hover {
            background: rgba(168, 85, 247, 0.2);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
        }
        
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
            color-scheme: dark;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
        }
        
        input[type="date"]:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: var(--neon-pink);
        }
        
        #date-modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(8px);
            z-index: 100; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a0b2e 0%, #0f0a1a 100%);
            padding: 30px 20px; 
            border-radius: 25px; 
            border: 1px solid var(--purp); 
            text-align: center; 
            width: 100%;
            max-width: 320px;
            box-shadow: var(--neon-purp);
            animation: slideUp 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .btn.disabled {
            opacity: 0.6;
            box-shadow: none !important;
            border-color: #444 !important;
            color: #888;
            cursor: not-allowed;
            filter: grayscale(0.5);
            background: rgba(255, 255, 255, 0.03);
            transform: none !important;
        }
        
        .btn.disabled:active {
            transform: none !important;
        }
        
        .btn.disabled::before {
            display: none;
        }
        
        .close-btn {
            color: gray; 
            margin-top: 20px; 
            cursor: pointer; 
            font-size: 0.9rem;
            transition: color 0.3s ease;
            padding: 8px;
        }
        
        .close-btn:hover {
            color: white;
        }
        
        /* Анимация для кнопки donate */
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); }
            50% { box-shadow: 0 0 25px rgba(236, 72, 153, 0.8); }
        }
        
        .btn[style*="ec4899"] {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <canvas id="fireflies-canvas"></canvas>
    
    <div class="welcome-card">
        <h1>COSMIC TARO</h1>
        <p class="subtitle">Выберите инструмент предсказания</p>
        
        <a href="/taro/index.html" class="btn" aria-label="Перейти к картам Таро">
            <span>🔮</span> КАРТЫ ТАРО
        </a>
        
        <div class="btn disabled" aria-disabled="true" aria-label="Руны в разработке">
            <span>ᚱ</span> РУНЫ (СКОРО)
        </div>

        <button onclick="openDateModal()" class="btn" aria-label="Прогноз по дате рождения" style="background: rgba(236, 72, 153, 0.1); border-color: #ec4899; box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);">
            <span>📅</span> ПРОГНОЗ ПО ДАТЕ (50 ⭐)
        </button>
    </div>

    <div id="date-modal" onclick="if(event.target === this) closeDateModal()">
        <div class="modal-content">
            <h3 style="margin-top: 0; margin-bottom: 20px; color: var(--purp);">📅 Ваша дата рождения</h3>
            <input type="date" id="birth-date" 
                   placeholder="ДД.ММ.ГГГГ"
                   max="2026-12-31"
                   min="1900-01-01"
                   style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--purp); background: #050508; color: white; margin-bottom: 20px; box-sizing: border-box; font-size: 1rem;">
            
            <button onclick="processPayment()" class="btn" style="width: 100%; margin: 0; background: #ec4899; border: none; animation: none;">
                💫 ОПЛАТИТЬ 50 ⭐
            </button>
            
            <div onclick="closeDateModal()" class="close-btn">Отмена</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        let isPaying = false;
        
        if (tg) {
            tg.ready();
            tg.expand();
            if (tg.setHeaderColor) tg.setHeaderColor('#050508');
            if (tg.setBackgroundColor) tg.setBackgroundColor('#050508');
        }

        // --- CANVAS СВЕТЛЯЧКИ (улучшенная версия) ---
        const canvas = document.getElementById('fireflies-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, fireflies = [];
        const config = { 
            quantity: 60, 
            size: { min: 1, max: 3 }, 
            speed: { min: 0.2, max: 0.6 }, 
            color: '#d4a1f9',
            glow: true
        };

        function setCanvasSize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Firefly {
            constructor() { 
                this.init(); 
            }
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.r = Math.random() * (config.size.max - config.size.min) + config.size.min;
                this.vx = (Math.random() - 0.5) * config.speed.max;
                this.vy = (Math.random() - 0.5) * config.speed.max;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.fadeRate = Math.random() * 0.01 + 0.003;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = config.glow ? 10 : 0;
                ctx.shadowColor = config.color;
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2, false);
                ctx.fillStyle = config.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha += this.fadeRate;
                if (this.alpha > 0.8 || this.alpha < 0.1) this.fadeRate = -this.fadeRate;
                if (this.x > width + this.r) this.x = -this.r;
                else if (this.x < -this.r) this.x = width + this.r;
                if (this.y > height + this.r) this.y = -this.r;
                else if (this.y < -this.r) this.y = height + this.r;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            fireflies.forEach(f => { 
                f.update(); 
                f.draw(); 
            });
            requestAnimationFrame(animate);
        }

        function initFireflies() {
            fireflies = [];
            for(let i = 0; i < config.quantity; i++) {
                fireflies.push(new Firefly());
            }
        }

        setCanvasSize();
        initFireflies();
        animate();
        
        window.addEventListener('resize', () => {
            setCanvasSize();
            initFireflies();
        });

        // --- ЛОГИКА МОДАЛКИ С БЛОКИРОВКОЙ ---
        function openDateModal() {
            document.getElementById('date-modal').style.display = 'flex';
            // Фокус на инпут для удобства
            setTimeout(() => {
                document.getElementById('birth-date').focus();
            }, 100);
        }

        function closeDateModal() {
            document.getElementById('date-modal').style.display = 'none';
            isPaying = false; // Сброс флага при закрытии
        }

        async function processPayment() {
            if (isPaying) return;
            
            const birthDate = document.getElementById('birth-date').value;
            if (!birthDate) {
                if (tg?.showAlert) {
                    tg.showAlert("Пожалуйста, выберите дату рождения");
                } else {
                    alert("Пожалуйста, выберите дату рождения");
                }
                return;
            }
            
            // Валидация возраста
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }
            
            if (age < 13) {
                if (tg?.showAlert) {
                    tg.showAlert("Сервис доступен пользователям старше 13 лет");
                } else {
                    alert("Сервис доступен пользователям старше 13 лет");
                }
                return;
            }
            
            isPaying = true;
            
            // Демо-режим (тестовая дата)
            if (birthDate === "2026-01-01") {
                localStorage.setItem('userBirthDate', birthDate);
                window.location.href = '/taro/index.html?mode=birthday';
                return; 
            }

            try {
                const res = await fetch('/api/get-invoice?type=birthday');
                const data = await res.json();
                
                if (tg?.openInvoice && data.url) {
                    tg.openInvoice(data.url, (status) => {
                        if (status === 'paid') {
                            localStorage.setItem('userBirthDate', birthDate);
                            window.location.href = '/taro/index.html?mode=birthday';
                        } else {
                            isPaying = false;
                        }
                    });
                } else {
                    // Для тестирования в браузере
                    console.log("Demo mode - Invoice URL:", data.url);
                    alert("Демо-режим: оплата доступна только в Telegram");
                    isPaying = false;
                }
            } catch (e) {
                console.error("Payment error:", e);
                if (tg?.showAlert) {
                    tg.showAlert("Ошибка при инициализации оплаты. Попробуйте позже.");
                } else {
                    alert("Ошибка при инициализации оплаты. Попробуйте позже.");
                }
                isPaying = false;
            }
        }
        
        // Защита от случайного закрытия модалки при клике на контент
        document.getElementById('date-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDateModal();
            }
        });
        
        // Enter на инпуте
        document.getElementById('birth-date').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processPayment();
            }
        });
    </script>
</body>
</html>
