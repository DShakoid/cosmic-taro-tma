<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Tarot v6 - Magic Returns</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="tarotData.js"></script>
    <style>
        :root { 
            --purp: #a855f7; 
            --pink: #ec4899; 
            --bg: #050508; 
            --glass: rgba(255, 255, 255, 0.03);
            --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
            --neon-pink: 0 0 20px rgba(236, 72, 153, 0.7);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; background: var(--bg); color: #f3e8ff;
            display: flex; justify-content: center; min-height: 100vh; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
            z-index: 1;
        }

        /* Основной контейнер теперь не растягивает контент по вертикали */
.container {
    position: relative; 
    z-index: 10; 
    width: 100%; 
    max-width: 400px;
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 15px; 
    box-sizing: border-box;
    /* Убираем лишние центровки, чтобы всё шло по порядку сверху вниз */
}

        /* --- МЕНЮ --- */
        .menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; z-index: 100; }
        .menu-btn {
            background: var(--glass); border: 1px solid rgba(168, 85, 247, 0.2);
            color: rgba(255,255,255,0.6); padding: 10px 5px; border-radius: 12px; 
            font-size: 0.7rem; flex: 1; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .menu-btn.active { 
            background: rgba(168, 85, 247, 0.15); color: white; border-color: var(--purp);
            box-shadow: var(--neon-purp);
        }

        /* --- КОЛОДА --- */
        .deck-container { 
            display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; z-index: 50;
        }
        .deck {
            width: 65px; height: 95px; background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border: 2px solid var(--purp); border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--neon-purp); transition: 0.3s;
        }
        .deck:active { transform: scale(0.95); box-shadow: 0 0 5px var(--purp); }

        /* --- СЕТКА СЛОТОВ (Flexbox для центровки) --- */
        /* Сама таблица с картами */
.table {
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 12px;
    margin: 15px 0; 
    width: 100%; 
    z-index: 5;
    /* Убираем min-height, чтобы таблица занимала ровно столько, сколько нужно картам */
}
        .table-row {
            display: flex; justify-content: center; gap: 10px; width: 100%;
        }
        .slot {
            width: 75px; height: 110px; border: 1px solid rgba(168, 85, 247, 0.15);
            border-radius: 10px; background: rgba(255,255,255,0.01); position: relative;
            transition: 0.3s;
        }
        .slot.large { width: 140px; height: 200px; border-color: rgba(168, 85, 247, 0.3); }
        /* Подсветка активного слота */
        .slot.active-target { border-color: rgba(236, 72, 153, 0.4); box-shadow: 0 0 10px rgba(236, 72, 153, 0.2); }

        /* --- МАГИЧЕСКИЕ КАРТЫ (Анимация) --- */
        .card-anim { 
            position: fixed; /* Левитация над всем */
            z-index: 500; 
            /* Плавная пружинистая анимация полета */
            transition: 
                left 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                top 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                width 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                height 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                box-shadow 0.4s ease,
                opacity 0.3s ease;
            transform-style: preserve-3d;
            box-shadow: var(--neon-purp); /* Неон при появлении */
            pointer-events: none; /* Чтобы не мешала кликам пока летит */
        }
        
        /* Плавный поворот */
        .card-anim.flipped { 
            transform: rotateY(180deg); 
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1), left 0.8s, top 0.8s, width 0.8s, height 0.8s;
        }
        .card-anim.is-reversed.flipped { 
            transform: rotateY(180deg) rotateZ(180deg); 
        }

        /* Когда карта прилетела (финал) */
        .card-anim.arrived { 
            box-shadow: var(--neon-pink); /* Розовый неон на столе */
            pointer-events: auto; /* Можно кликать */
        }

        .face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box;
        }
        .back { 
            background: #1e1b4b; border: 2px solid var(--purp); color: var(--purp); font-size: 24px;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNhODU1ZiciIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
        }
        .front { 
            background: #0f172a; border: 2px solid var(--pink); transform: rotateY(180deg); 
            padding: 8px; text-align: center;
        }

        .card-emoji { font-size: 24px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        .slot.large .card-emoji { font-size: 50px; }
        .card-name { font-size: 8px; color: #f3e8ff; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .slot.large .card-name { font-size: 12px; }

        /* Блок предсказания теперь всегда идет СРАЗУ за таблицей */
.prediction-box {
    width: 100%; 
    background: rgba(20, 15, 30, 0.6); 
    border-radius: 20px;
    padding: 18px; 
    border: 1px solid rgba(168, 85, 247, 0.15);
    backdrop-filter: blur(15px); 
    -webkit-backdrop-filter: blur(15px);
    text-align: center; 
    box-sizing: border-box;
    
    /* ГЛАВНЫЕ ИЗМЕНЕНИЯ ТУТ: */
    margin-top: 20px; /* Фиксированный отступ под картами */
    margin-bottom: 30px; /* Отступ снизу, чтобы не прилипало к краю экрана */
    min-height: auto; /* Убираем минимальную высоту, пусть подстраивается под текст */
    flex-shrink: 0; /* Не даем блоку сжиматься */
}

        .overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(5px);
        }
        .overlay.active { display: flex; opacity: 1; }
        .modal-card { 
            width: 85%; max-width: 320px; background: rgba(10, 7, 15, 0.95); 
            border: 2px solid var(--purp); border-radius: 24px; padding: 25px; 
            text-align: center; box-shadow: var(--neon-purp);
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .overlay.active .modal-card { transform: scale(1); }

        .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .action-btn { 
            background: var(--pink); border: none; color: white; padding: 10px 20px; 
            border-radius: 12px; font-size: 0.75rem; font-weight: bold; cursor: pointer; 
            transition: 0.2s; box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3);
        }
        .action-btn:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(236, 72, 153, 0.2); }
        
        /* ЧАСТИЦЫ */
        .particle {
            position: fixed; width: 5px; height: 5px; border-radius: 50%;
            pointer-events: none; opacity: 0; z-index: 1000;
            animation: particle-fly 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        @keyframes particle-fly {
            0% { transform: translate(0, 0) scale(1.5); opacity: 1; }
            100% { transform: translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px)) scale(0); opacity: 0; }
        }
        
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #prediction-text { font-size: 0.9rem; line-height: 1.5; color: #e2d5f5; }
        #prediction-text b { color: white; font-size: 1rem; }
        #prediction-text small { color: var(--purp); font-size: 0.75rem; letter-spacing: 1px; }

        .face.back {
    /* Укажи здесь точное название своего файла, например 'rubashka.jpg' */
    background-image: url('back_card.jpg'); 
    background-size: cover; /* Картинка заполнит всю карту целиком */
    background-position: center;
    background-repeat: no-repeat;
    background-color: #1a1525;
    
    /* Эффект объема и скругление */
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* Убираем старый текстовый символ, если он мешает узору */
.face.back::after {
    content: ''; /* Если хочешь оставить ✦ поверх своей картинки, напиши тут '✦' */
    font-size: 2rem;
    color: rgba(168, 85, 247, 0.3);
}
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')">Совет</button>
        </div>

        <div class="deck-container">
            <div class="deck" onclick="drawCard()">
                <div style="color: var(--purp); font-size: 24px; filter: drop-shadow(0 0 5px var(--purp));">✦</div>
            </div>
            <div style="font-size: 0.5rem; color: var(--purp); margin-top: 8px; letter-spacing: 2px; font-weight: bold; text-transform: uppercase;">ТЯНИ КАРТУ</div>
        </div>

        <div id="table" class="table"></div>

        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text" class="fade-in">Выберите режим и прикоснитесь к колоде</div>
            <div class="btn-row">
                <button id="reset-btn" onclick="setMode(currentMode)" style="display:none;" class="action-btn">ЗАНОВО</button>
                <button id="share-btn" onclick="prepareForScreenshot()" style="display:none;" class="action-btn" style="background:rgba(168, 85, 247, 0.1); border:1px solid var(--purp); color:var(--purp); box-shadow:none;">СКРИН</button>
                <button id="donate-btn" class="action-btn" style="display:none; background: linear-gradient(45deg, #ff9d00, #edb931);">
    <span>⭐ Поблагодарить</span>
</button>
            </div>
        </div>
    </div>

    <div id="card-overlay" class="overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="m-emoji" style="font-size: 60px; filter: drop-shadow(0 0 10px white);"></div>
            <div id="m-name" style="color: white; font-weight: bold; font-size: 1.3rem; margin: 10px 0;"></div>
            <div id="m-desc" style="font-size: 0.9rem; text-align: left; line-height: 1.5; color: #e2d5f5;"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; border-radius:12px; background:var(--purp); border:none; color:white; font-weight:bold; cursor:pointer; font-size:0.9rem; box-shadow:var(--neon-purp);">ПОНЯТНО</button>
        </div>
    </div>

<script>
    let currentMode = '';
    let drawnCount = 0;
    let maxCards = 0;
    let selectedCards = [];

    // --- ИНИЦИАЛИЗАЦИЯ РЕЖИМА ---
    function setMode(newMode) {
        currentMode = newMode;
        drawnCount = 0;
        selectedCards = [];
        
        const table = document.getElementById('table');
        table.innerHTML = '';
        table.className = 'table mode-' + newMode;

        // Чистим старые карты с экрана
        document.querySelectorAll('.card-anim').forEach(c => c.remove());

        // Управление кнопками меню
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + newMode);
        if(activeBtn) activeBtn.classList.add('active');

        // Скрываем кнопки финала
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('share-btn').style.display = 'none';
        document.getElementById('donate-btn').style.display = 'none';

        if (newMode === 'day') {
            createRow(0, 1, true);
            maxCards = 1;
        } else if (newMode === 'week') {
            createRow(0, 4);
            createRow(4, 7);
            maxCards = 7;
        } else if (newMode === 'advice') {
            createRow(0, 3);
            createRow(3, 6);
            maxCards = 6;
        }

        function createRow(startId, endId, isLarge = false) {
            const row = document.createElement('div');
            row.className = 'table-row';
            for (let i = startId; i < endId; i++) {
                const s = document.createElement('div');
                s.className = 'slot' + (isLarge ? ' large' : '');
                s.id = 'slot' + i;
                row.appendChild(s);
            }
            table.appendChild(row);
        }
        
        if (maxCards > 0) document.getElementById('slot0').classList.add('active-target');
        document.getElementById('prediction-text').innerHTML = "Колода перемешана. Тяните карту.";
    }

    // --- МАГИЯ ДОСТАВАНИЯ КАРТЫ ---
    function drawCard() {
        if (!currentMode || drawnCount >= maxCards) return;

        const deck = document.querySelector('.deck'); 
        const deckRect = deck.getBoundingClientRect();
        createParticles(deckRect.left + deckRect.width / 2, deckRect.top + deckRect.height / 2, '#a855f7');

        const slot = document.getElementById('slot' + drawnCount);
        const slotRect = slot.getBoundingClientRect();
        slot.classList.remove('active-target');

        const availableCards = tarotDB.cards.filter(c => !selectedCards.find(s => s.id === c.id));
        const cardData = availableCards[Math.floor(Math.random() * availableCards.length)];
        const isReversed = Math.random() < 0.25;
        const cardInstance = { ...cardData, isReversed };
        selectedCards.push(cardInstance);

        drawnCount++; 

        const card = document.createElement('div');
        card.className = `card-anim`;
        card.style.width = deckRect.width + 'px';
        card.style.height = deckRect.height + 'px';
        card.style.left = deckRect.left + 'px';
        card.style.top = deckRect.top + 'px';
        
        const reversedLabel = isReversed ? `<div style="font-size: 6px; color: #ff4d4d; position: absolute; bottom: 3px; font-weight:bold;">ПЕРЕВЕРНУТА</div>` : '';
        
        // ЗДЕСЬ УДАЛЕН СИМВОЛ ✦, ЧТОБЫ БЫЛА ТОЛЬКО ТВОЯ РУБАШКА
        card.innerHTML = `
            <div class="face back"></div>
            <div class="face front">
                <div class="card-emoji">${cardData.emoji}</div>
                <div class="card-name">${cardData.name}</div>
                ${reversedLabel}
            </div>
        `;
        
        document.body.appendChild(card);
        updatePrediction();

        requestAnimationFrame(() => {
            card.style.opacity = '1';
            card.style.left = slotRect.left + 'px';
            card.style.top = slotRect.top + 'px';
            card.style.width = slotRect.width + 'px';
            card.style.height = slotRect.height + 'px';
            
            setTimeout(() => {
                if (isReversed) card.classList.add('is-reversed');
                card.classList.add('flipped');
            }, 100);
        });

        setTimeout(() => {
            card.classList.add('arrived');
            card.onclick = () => showModal(cardInstance);
            createParticles(slotRect.left + slotRect.width / 2, slotRect.top + slotRect.height / 2, '#ec4899');
            
            const nextSlot = document.getElementById('slot' + drawnCount);
            if (nextSlot) nextSlot.classList.add('active-target');
        }, 800);
    }

    function updatePrediction() {
        const box = document.getElementById('prediction-text');
        if (!box) return;

        let html = "";
        if (selectedCards.length > 0) {
            if (currentMode === 'day') {
                const last = selectedCards[0];
                html = `<div class="fade-in"><b>${last.name}</b><br><small>${last.keywords}</small><p>${last.isReversed ? last.advice_rev : last.advice}</p></div>`;
            } else {
                const counts = {};
                selectedCards.forEach(c => counts[c.element] = (counts[c.element] || 0) + 1);
                let dominant = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                html = `<div class="fade-in"><b>Доминанта: ${dominant}</b><br><small>${tarotDB.elementalAdvice[dominant]}</small></div>`;

                if (drawnCount < maxCards) {
                    html += `<div style="margin-top:10px; color:var(--pink); font-size:0.75rem; animation: pulse 1s infinite;">Тяните карту №${drawnCount + 1}...</div>`;
                } else {
                    html += `<div style="margin-top:10px; font-weight:bold; color:var(--purp);">РАСКЛАД ЗАВЕРШЕН</div>`;
                }
            }
        }
        box.innerHTML = html;

        // Показ кнопок при завершении
        if (drawnCount >= maxCards && maxCards > 0) {
            document.getElementById('reset-btn').style.display = 'inline-block';
            document.getElementById('share-btn').style.display = 'inline-block';
            document.getElementById('donate-btn').style.display = 'inline-block';
        }
    }

    // Донат через Telegram Stars
    document.getElementById('donate-btn').onclick = function() {
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.sendData(JSON.stringify({
                action: "donate",
                amount: 50
            }));
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        } else {
            alert("Донаты работают только внутри Telegram!");
        }
    };

    function createParticles(x, y, color) {
        for (let i = 0; i < 10; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            p.style.background = color;
            const a = Math.random() * Math.PI * 2;
            const v = Math.random() * 50 + 20;
            p.style.setProperty('--dx', Math.cos(a) * v);
            p.style.setProperty('--dy', Math.sin(a) * v);
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }
    }

    function showModal(card) {
        const overlay = document.getElementById('card-overlay');
        document.getElementById('m-emoji').innerText = card.emoji;
        document.getElementById('m-name').innerText = card.name + (card.isReversed ? ' (пер.)' : '');
        document.getElementById('m-desc').innerHTML = card.isReversed ? card.advice_rev : card.advice;
        overlay.classList.add('active');
    }

    function closeModal() { document.getElementById('card-overlay').classList.remove('active'); }

    function prepareForScreenshot() {
        document.querySelectorAll('.menu, .deck-container, .action-btn').forEach(el => el.style.opacity = '0');
        setTimeout(() => { 
            alert("Сделайте скриншот"); 
            document.querySelectorAll('.menu, .deck-container, .action-btn').forEach(el => el.style.opacity = '1'); 
        }, 100);
    }

    setMode('day');
</script>
</script>
</body>
</html>
