<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Tarot v6.2</title>
    <link rel="icon" type="image/png" href="icon_cosmic_taro128.png">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="tarotData.js"></script>
<style>
    :root { 
        --purp: #a855f7; 
        --pink: #ec4899; 
        --bg: #050508; 
        --glass: rgba(255, 255, 255, 0.03);
        --neon-purp: 0 0 15px rgba(168, 85, 247, 0.6);
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; background: var(--bg); color: #f3e8ff;
        display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
        user-select: none; -webkit-user-select: none;
    }

    .stars {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
        z-index: 1;
    }

    .container {
        position: relative; z-index: 10; width: 100%; max-width: 400px;
        display: flex; flex-direction: column; align-items: center; 
        padding: calc(env(safe-area-inset-top, 0px) + 50px) 15px 30px 15px;
        box-sizing: border-box;
    }

    .menu { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; z-index: 100; }
    .menu-btn {
        background: var(--glass); border: 1px solid rgba(168, 85, 247, 0.2);
        color: rgba(255,255,255,0.6); padding: 10px 5px; border-radius: 12px; 
        font-size: 0.7rem; flex: 1; transition: 0.3s; cursor: pointer;
        backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        text-transform: uppercase; letter-spacing: 1px;
    }
    .menu-btn.active { 
        background: rgba(168, 85, 247, 0.15); color: white; border-color: var(--purp);
        box-shadow: var(--neon-purp);
    }

    .deck-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; z-index: 50; }
    .deck {
        width: 60px; height: 85px; 
        background: #1e1b4b url('back_card.jpg') center/cover;
        border: 2px solid var(--purp); border-radius: 10px; cursor: pointer;
        box-shadow: var(--neon-purp);
    }

    .table { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 10px 0; width: 100%; }
    .table-row { display: flex; justify-content: center; gap: 8px; width: 100%; }
    
    .slot {
        width: 72px; height: 105px; border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 10px; background: rgba(255,255,255,0.01); position: relative;
    }
    .slot.large { width: 130px; height: 185px; }
    .slot.active-target { border-color: var(--pink); box-shadow: 0 0 10px rgba(236, 72, 153, 0.3); }

    .card-anim { 
        position: fixed; z-index: 500; transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        transform-style: preserve-3d; border-radius: 10px; overflow: hidden;
    }
    .card-anim.flipped { transform: rotateY(180deg); }
    .card-anim.is-reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }

    .face { 
        position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
        border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        box-sizing: border-box;
    }
    .face.back { background: #1e1b4b url('back_card.jpg') center/cover; border: 2px solid var(--purp); z-index: 2; }
    .face.front { background: #0f172a; border: 2px solid var(--pink); transform: rotateY(180deg); padding: 5px; z-index: 1; }

    .card-emoji { font-size: 20px; }
    .slot.large .card-emoji { font-size: 45px; }
    .card-name { font-size: 7px; color: #f3e8ff; margin-top: 4px; text-transform: uppercase; text-align: center; }
    .slot.large .card-name { font-size: 11px; }

    .prediction-box {
        width: 100%; background: rgba(20, 15, 30, 0.7);
        border-radius: 20px; padding: 15px; border: 1px solid rgba(168, 85, 247, 0.2);
        backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        text-align: center; box-sizing: border-box; margin-top: 10px;
    }

    #prediction-text { font-size: 0.85rem; line-height: 1.4; }
    .card-result-item { 
        background: rgba(255,255,255,0.05); border-radius: 8px; padding: 8px; 
        margin-top: 8px; text-align: left; font-size: 0.75rem; border-left: 2px solid var(--pink);
    }

    .btn-row { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; width: 100%; align-items: center; }
    .action-btn {
        width: 85%; padding: 12px; border-radius: 12px; font-size: 0.8rem; font-weight: bold;
        border: none; cursor: pointer; color: white; transition: 0.2s;
    }
    #reset-btn { background: var(--purp); }
    #donate-btn { background: linear-gradient(45deg, #f59e0b, #d97706); }

    .overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center;
        opacity: 0; transition: 0.3s; backdrop-filter: blur(5px);
    }
    .overlay.active { display: flex; opacity: 1; }
    .modal-card { 
        width: 85%; max-width: 320px; background: #0a070f; 
        border: 2px solid var(--purp); border-radius: 24px; padding: 20px; text-align: center;
    }
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')">Совет</button>
        </div>

        <div class="deck-container">
            <div class="deck" onclick="drawCard()"></div>
            <div style="color:var(--purp); font-size:0.6rem; margin-top:5px; letter-spacing:1px;">ТЯНИ КАРТУ</div>
        </div>

        <div id="table" class="table"></div>

        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text">Выберите режим</div>
            <div class="btn-row">
                <button id="reset-btn" onclick="setMode(currentMode)" style="display:none;" class="action-btn">ЗАНОВО</button>
                <button id="donate-btn" class="action-btn" style="display:none;">⭐ ПОБЛАГОДАРИТЬ</button>
            </div>
        </div>
    </div>

    <div id="card-overlay" class="overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="m-emoji" style="font-size: 50px;"></div>
            <div id="m-name" style="color: white; font-weight: bold; margin: 10px 0;"></div>
            <div id="m-desc" style="font-size: 0.85rem; text-align: left; color: #e2d5f5;"></div>
            <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:12px; border-radius:12px; background:var(--purp); color:white; border:none; font-weight:bold;">ЗАКРЫТЬ</button>
        </div>
    </div>

<script>
    let currentMode = '';
    let drawnCount = 0;
    let maxCards = 0;
    let selectedCards = [];

    function setMode(newMode) {
        currentMode = newMode;
        drawnCount = 0;
        selectedCards = [];
        const table = document.getElementById('table');
        table.innerHTML = '';
        document.querySelectorAll('.card-anim').forEach(c => c.remove());
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + newMode).classList.add('active');
        
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('donate-btn').style.display = 'none';

        if (newMode === 'day') { createRow(0, 1, true); maxCards = 1; }
        else if (newMode === 'week') { createRow(0, 4); createRow(4, 7); maxCards = 7; }
        else if (newMode === 'advice') { createRow(0, 3); createRow(3, 6); maxCards = 6; }

        function createRow(start, end, large = false) {
            const row = document.createElement('div'); row.className = 'table-row';
            for (let i = start; i < end; i++) {
                const s = document.createElement('div'); s.className = 'slot' + (large ? ' large' : '');
                s.id = 'slot' + i; row.appendChild(s);
            }
            table.appendChild(row);
        }
        document.getElementById('slot0').classList.add('active-target');
        document.getElementById('prediction-text').innerHTML = "Тяните карту для начала...";
    }

    function drawCard() {
        if (!currentMode || drawnCount >= maxCards) return;

        const deck = document.querySelector('.deck');
        const deckRect = deck.getBoundingClientRect();
        const slot = document.getElementById('slot' + drawnCount);
        const slotRect = slot.getBoundingClientRect();
        
        slot.classList.remove('active-target');

        const cardData = tarotDB.cards[Math.floor(Math.random() * tarotDB.cards.length)];
        const isReversed = Math.random() < 0.2;
        const inst = { ...cardData, isReversed };
        selectedCards.push(inst);

        const card = document.createElement('div');
        card.className = 'card-anim';
        Object.assign(card.style, {
            width: deckRect.width+'px', height: deckRect.height+'px',
            left: deckRect.left+'px', top: deckRect.top+'px'
        });
        
        card.innerHTML = `
            <div class="face back"></div>
            <div class="face front">
                <div class="card-emoji">${cardData.emoji}</div>
                <div class="card-name">${cardData.name}</div>
            </div>
        `;
        document.body.appendChild(card);

        setTimeout(() => {
            Object.assign(card.style, {
                left: slotRect.left+'px', top: slotRect.top+'px',
                width: slotRect.width+'px', height: slotRect.height+'px'
            });
            setTimeout(() => {
                if(isReversed) card.classList.add('is-reversed');
                card.classList.add('flipped');
            }, 100);
        }, 10);

        drawnCount++;
        setTimeout(() => {
            card.onclick = () => showModal(inst);
            const next = document.getElementById('slot' + drawnCount);
            if(next) next.classList.add('active-target');
            updatePrediction();
        }, 800);
    }

    function updatePrediction() {
        const text = document.getElementById('prediction-text');
        if (currentMode === 'day' && selectedCards.length === 1) {
            const c = selectedCards[0];
            text.innerHTML = `<b>${c.name}</b><br><small>${c.isReversed?'(Перевернутая)':'(Прямая)'}</small><p>${c.isReversed?c.advice_rev:c.advice}</p>`;
        } else if (selectedCards.length > 0) {
            const counts = {};
            selectedCards.forEach(c => counts[c.element] = (counts[c.element] || 0) + 1);
            let dom = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            
            let html = `<b>Доминанта: ${dom}</b><br><small>${tarotDB.elementalAdvice[dom]}</small>`;
            
            // Вывод значений всех карт в списке
            selectedCards.forEach((c, idx) => {
                html += `<div class="card-result-item">
                    <b>${idx+1}. ${c.name}</b> ${c.isReversed?'(пер.)':''} — 
                    ${c.isReversed ? c.advice_rev.substring(0, 60) : c.advice.substring(0, 60)}...
                </div>`;
            });

            text.innerHTML = html;
        }
        
        if (drawnCount >= maxCards) {
            document.getElementById('reset-btn').style.display = 'block';
            document.getElementById('donate-btn').style.display = 'block';
        }
    }

    function showModal(card) {
        document.getElementById('m-emoji').innerText = card.emoji;
        document.getElementById('m-name').innerText = card.name + (card.isReversed ? ' (пер.)' : '');
        document.getElementById('m-desc').innerHTML = card.isReversed ? card.advice_rev : card.advice;
        document.getElementById('card-overlay').classList.add('active');
    }

    function closeModal() { document.getElementById('card-overlay').classList.remove('active'); }
    setMode('day');
</script>
</body>
</html>
