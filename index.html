<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Tarot v6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="tarotData.js"></script>
<style>
    :root { 
        --purp: #a855f7; 
        --pink: #ec4899; 
        --bg: #050508; 
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; background: var(--bg); color: #f3e8ff;
        height: 100vh; width: 100vw; overflow: hidden; position: fixed;
    }

    .stars {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050505 100%);
        z-index: 1;
    }

    .container {
        position: relative; z-index: 10; 
        width: 100%; height: 100%;
        max-width: 450px; margin: 0 auto;
        display: flex; flex-direction: column; 
        /* ТОЧНЫЕ ОТСТУПЫ */
        padding: calc(env(safe-area-inset-top, 0px) + 55px) 15px calc(env(safe-area-inset-bottom, 0px) + 25px) 15px;
        box-sizing: border-box;
    }

    .menu { display: flex; gap: 8px; margin-bottom: 20px; margin-top: 10px; }
    .menu-btn {
        background: rgba(255,255,255,0.03); border: 1px solid rgba(168, 85, 247, 0.2);
        color: rgba(255,255,255,0.5); padding: 12px 5px; border-radius: 12px; 
        font-size: 0.75rem; flex: 1; transition: 0.3s; cursor: pointer;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        text-transform: uppercase;
    }
    .menu-btn.active { 
        background: rgba(168, 85, 247, 0.2); color: white; border-color: var(--purp);
        box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
    }

    .deck-container { display: flex; justify-content: center; margin-bottom: 20px; }
    .deck {
        width: 65px; height: 100px; 
        background: #1e1b4b url('back_card.jpg') center/cover;
        border: 2px solid var(--purp); border-radius: 10px; cursor: pointer;
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
    }

    /* ФИКСИРОВАННАЯ СЕТКА */
    .table { 
        display: flex; flex-direction: column; align-items: center; 
        justify-content: center; gap: 12px; flex: 1; width: 100%;
    }
    .table-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
    
    .slot {
        width: 70px; height: 105px; border: 1px solid rgba(168, 85, 247, 0.15);
        border-radius: 8px; background: rgba(255,255,255,0.02); position: relative;
    }
    .slot.large { width: 150px; height: 220px; }
    .slot.active-target { border-color: var(--pink); box-shadow: 0 0 12px rgba(236, 72, 153, 0.4); }

    .prediction-box {
        width: 100%; background: rgba(20, 15, 30, 0.9); border-radius: 24px;
        padding: 20px; border: 1px solid rgba(168, 85, 247, 0.3);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        text-align: center; margin-top: 15px;
    }

    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    .action-btn { 
        background: var(--pink); border: none; color: white; padding: 12px 18px; 
        border-radius: 14px; font-size: 0.8rem; font-weight: bold; cursor: pointer;
    }
    #donate-btn { background: linear-gradient(45deg, #f59e0b, #d97706); }
    #share-btn { background: rgba(168, 85, 247, 0.2); border: 1px solid var(--purp); }

    /* ПЛАВНАЯ АНИМАЦИЯ */
    .card-anim { 
        position: fixed; z-index: 500; 
        transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-style: preserve-3d;
    }
    .card-anim.flipped { transform: rotateY(180deg); }
    .card-anim.is-reversed.flipped { transform: rotateY(180deg) rotateZ(180deg); }
    
    .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; overflow: hidden; }
    .face.back { background: #1e1b4b url('back_card.jpg') center/cover; border: 2px solid var(--purp); }
    .face.front { 
        background: #0f172a; border: 2px solid var(--pink); transform: rotateY(180deg); 
        display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px;
    }

    .card-emoji { font-size: 30px; }
    .slot.large .card-emoji { font-size: 60px; }
    .card-name { font-size: 9px; color: white; margin-top: 8px; text-transform: uppercase; text-align: center; font-weight: bold; }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    .overlay.active { display: flex; }
    .modal-card { width: 85%; max-width: 350px; background: #0a070f; border: 1px solid var(--purp); border-radius: 24px; padding: 30px; text-align: center; }
</style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="menu">
            <button class="menu-btn" id="btn-day" onclick="setMode('day')">День</button>
            <button class="menu-btn" id="btn-week" onclick="setMode('week')">Неделя</button>
            <button class="menu-btn" id="btn-advice" onclick="setMode('advice')">Совет</button>
        </div>

        <div class="deck-container">
            <div class="deck" onclick="drawCard()"></div>
        </div>

        <div id="table" class="table"></div>

        <div id="prediction-box" class="prediction-box">
            <div id="prediction-text">Выберите режим</div>
            <div class="btn-row">
                <button id="reset-btn" onclick="setMode(currentMode)" style="display:none;" class="action-btn">ЗАНОВО</button>
                <button id="share-btn" onclick="tg.showAlert('Сделайте скриншот')" style="display:none;" class="action-btn">СКРИН</button>
                <button id="donate-btn" class="action-btn" style="display:none;">⭐ ПОБЛАГОДАРИТЬ</button>
            </div>
        </div>
    </div>

    <div id="card-overlay" class="overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="m-emoji" style="font-size: 60px;"></div>
            <div id="m-name" style="color:white; font-size:1.2rem; margin:15px 0; font-weight:bold;"></div>
            <div id="m-desc" style="font-size:0.95rem; color:#ccc; line-height: 1.6;"></div>
            <button onclick="closeModal()" style="margin-top:25px; width:100%; padding:15px; border-radius:15px; background:var(--purp); border:none; color:white; font-weight:bold;">ЗАКРЫТЬ</button>
        </div>
    </div>

<script>
    const tg = window.Telegram?.WebApp;
    let currentMode = '';
    let drawnCount = 0;
    let maxCards = 0;
    let selectedCards = [];

    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#050508');
        tg.setBackgroundColor('#050508');
    }

    function setMode(mode) {
        currentMode = mode;
        drawnCount = 0;
        selectedCards = [];
        const table = document.getElementById('table');
        table.innerHTML = '';
        document.querySelectorAll('.card-anim').forEach(c => c.remove());
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('share-btn').style.display = 'none';
        document.getElementById('donate-btn').style.display = 'none';

        if (mode === 'day') { createRow(0, 1, true); maxCards = 1; }
        else if (mode === 'week') { createRow(0, 4); createRow(4, 7); maxCards = 7; }
        else if (mode === 'advice') { createRow(0, 3); createRow(3, 6); maxCards = 6; }

        function createRow(s, e, lg = false) {
            const row = document.createElement('div');
            row.className = 'table-row';
            for (let i = s; i < e; i++) {
                const sl = document.createElement('div');
                sl.className = 'slot' + (lg ? ' large' : '');
                sl.id = 'slot' + i;
                row.appendChild(sl);
            }
            table.appendChild(row);
        }
        document.getElementById('slot0').classList.add('active-target');
        document.getElementById('prediction-text').innerText = "Тяните карту";
    }

    function drawCard() {
        if (!currentMode || drawnCount >= maxCards) return;
        
        const slot = document.getElementById('slot' + drawnCount);
        const sr = slot.getBoundingClientRect();
        const deck = document.querySelector('.deck').getBoundingClientRect();

        const cardData = tarotDB.cards[Math.floor(Math.random() * tarotDB.cards.length)];
        const isRev = Math.random() < 0.25;
        const inst = { ...cardData, isReversed: isRev };
        selectedCards.push(inst);

        const card = document.createElement('div');
        card.className = 'card-anim';
        card.style = `width:${deck.width}px; height:${deck.height}px; left:${deck.left}px; top:${deck.top}px;`;
        card.innerHTML = `<div class="face back"></div><div class="face front"><div class="card-emoji">${cardData.emoji}</div><div class="card-name">${cardData.name}</div></div>`;
        document.body.appendChild(card);

        // Полет и переворот
        setTimeout(() => {
            card.style.left = sr.left + 'px'; 
            card.style.top = sr.top + 'px';
            card.style.width = sr.width + 'px'; 
            card.style.height = sr.height + 'px';
            setTimeout(() => { 
                if(isRev) card.classList.add('is-reversed'); 
                card.classList.add('flipped'); 
            }, 150);
        }, 50);

        drawnCount++;
        slot.classList.remove('active-target');
        const next = document.getElementById('slot' + drawnCount);
        if(next) next.classList.add('active-target');

        card.onclick = () => showModal(inst);
        if (drawnCount >= maxCards) setTimeout(showFinalState, 800);
    }

    function showFinalState() {
        document.getElementById('reset-btn').style.display = 'inline-block';
        document.getElementById('share-btn').style.display = 'inline-block';
        document.getElementById('donate-btn').style.display = 'inline-block';
        
        if (currentMode === 'day') {
            const c = selectedCards[0];
            document.getElementById('prediction-text').innerHTML = `<b>${c.name}</b><br>${c.isReversed ? c.advice_rev : c.advice}`;
        } else {
            document.getElementById('prediction-text').innerText = "Расклад готов";
        }
        if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }

    document.getElementById('donate-btn').onclick = async function() {
        try {
            const res = await fetch('/api/get-invoice');
            const data = await res.json();
            if (tg && data.url) {
                tg.openInvoice(data.url, (status) => {
                    if (status === 'paid') tg.showAlert('Спасибо! ✨');
                });
            }
        } catch (e) { tg.showAlert('Ошибка оплаты'); }
    };

    function showModal(c) {
        document.getElementById('m-emoji').innerText = c.emoji;
        document.getElementById('m-name').innerText = c.name + (c.isReversed ? ' (пер.)' : '');
        document.getElementById('m-desc').innerText = c.isReversed ? c.advice_rev : c.advice;
        document.getElementById('card-overlay').classList.add('active');
        if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function closeModal() { document.getElementById('card-overlay').classList.remove('active'); }

    setMode('day');
</script>
</body>
</html>
